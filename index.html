<section id="aba-saldos" class="max-w-3xl mx-auto px-4 py-8">
    
    <div class="flex items-center justify-between mb-8 bg-white p-5 rounded-[2rem] shadow-sm border border-gray-50">
        <button onclick="mudarMes(-1)" class="p-2 text-gray-300 hover:text-black transition-colors">❮</button>
        <div class="text-center">
            <span id="label-mes" class="font-bold text-xs uppercase tracking-[0.2em] text-[#1d3b91]">Março 2026</span>
        </div>
        <button onclick="mudarMes(1)" class="p-2 text-gray-300 hover:text-black transition-colors">❯</button>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <div class="bg-white p-6 rounded-[2.5rem] border border-gray-50 shadow-sm">
            <p class="text-[9px] font-bold text-gray-400 uppercase mb-2 tracking-widest text-center">Entradas</p>
            <p id="resumo-entradas" class="text-green-500 font-bold text-xl text-center">R$ 0,00</p>
        </div>
        <div class="bg-white p-6 rounded-[2.5rem] border border-gray-50 shadow-sm">
            <p class="text-[9px] font-bold text-gray-400 uppercase mb-2 tracking-widest text-center">Saídas</p>
            <p id="resumo-saidas" class="text-red-500 font-bold text-xl text-center">R$ 0,00</p>
        </div>
    </div>

    <div class="bg-white p-8 rounded-[3rem] border border-gray-50 shadow-sm mb-8">
        <h3 class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-10 text-center">Distribuição de Gastos</h3>
        <div id="container-grafico" class="space-y-8">
            </div>
    </div>

    <div id="modal-lote" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-6">
        <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full shadow-2xl animate-in zoom-in duration-300">
            <h4 class="font-bold text-sm uppercase mb-4 text-center">Lançamento Recorrente</h4>
            <p class="text-xs text-gray-500 text-center mb-8">Você deseja alterar apenas esta parcela ou aplicar a mudança em todos os 12 meses?</p>
            <div class="space-y-3">
                <button onclick="processarEdicaoLote('unica')" class="w-full py-4 bg-[#f4f4f4] rounded-2xl text-[10px] font-bold uppercase hover:bg-gray-200">Apenas este mês</button>
                <button onclick="processarEdicaoLote('todas')" class="w-full py-4 bg-[#1d3b91] text-white rounded-2xl text-[10px] font-bold uppercase shadow-lg shadow-blue-200">Todos os 12 meses</button>
                <button onclick="fecharModalLote()" class="w-full py-2 text-[9px] font-bold text-gray-300 uppercase mt-2">Cancelar</button>
            </div>
        </div>
    </div>
</section>

<script>
    let dadosCategorias = {
        "ALIMENTAÇÃO": 450.00,
        "TRANSPORTE": 280.00,
        "CONTAS FIXAS": 1200.00,
        "OUTROS": 150.00
    };

    function atualizarInterfaceGrafico() {
        const container = document.getElementById('container-grafico');
        const maxValor = Math.max(...Object.values(dadosCategorias));
        container.innerHTML = '';

        for (let cat in dadosCategorias) {
            const porcentagem = (dadosCategorias[cat] / maxValor) * 100;
            container.innerHTML += `
                <div class="space-y-2 animate-in fade-in slide-in-from-left duration-700">
                    <div class="flex justify-between text-[10px] font-bold uppercase tracking-tighter">
                        <span class="text-gray-600">${cat}</span>
                        <span class="text-[#1d3b91]">R$ ${dadosCategorias[cat].toFixed(2).replace('.', ',')}</span>
                    </div>
                    <div class="w-full bg-gray-50 h-2 rounded-full overflow-hidden">
                        <div class="bg-[#1d3b91] h-full rounded-full transition-all duration-1000" style="width: ${porcentagem}%"></div>
                    </div>
                </div>
            `;
        }
    }

    // Lógica de Edição em Lote
    function abrirModalLote(idLancamento) {
        document.getElementById('modal-lote').classList.remove('hidden');
        // Salva o ID para processamento
        window.currentEditId = idLancamento;
    }

    function fecharModalLote() {
        document.getElementById('modal-lote').classList.add('hidden');
    }

    function processarEdicaoLote(tipo) {
        if(tipo === 'todas') {
            console.log("Atualizando recorrência de 12 meses para o ID:", window.currentEditId);
            alert("Sucesso! Todas as parcelas futuras foram atualizadas.");
        } else {
            alert("Apenas a parcela de Março foi alterada.");
        }
        fecharModalLote();
    }

    // Inicialização
    atualizarInterfaceGrafico();
</script>
