<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Chat AI</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
            --primary: #00e676; --secondary: #ff5252; --accent: #2979ff; 
            --warning: #ffb74d; --recurring: #ba68c8;
        }

        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: var(--card); border-bottom: 1px solid #333; z-index: 10;
        }

        .header-left { display: flex; flex-direction: column; }
        .label-saldo { font-size: 0.7rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
        .val-header { color: var(--primary); font-size: 1.3rem; font-weight: bold; }

        .view { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding: 20px; padding-bottom: 160px; }
        .view.active { display: flex; }

        /* Estrutura do Card Organizada */
        .card-mov {
            background: var(--card); border-radius: 12px; padding: 18px; position: relative;
            width: 100%; max-width: 450px; margin-bottom: 15px; border-left: 6px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease;
        }
        .card-mov.receita { border-left-color: var(--primary); }
        .card-mov.despesa { border-left-color: var(--secondary); }
        .card-mov.parcelado { border-left-color: var(--warning); }

        .timer-bar { position: absolute; top: 0; left: 0; height: 3px; background: var(--accent); width: 100%; border-radius: 12px 12px 0 0; }

        /* Estilização Interna do Card */
        .card-tipo { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: #888; margin-bottom: 4px; }
        .card-nome { font-size: 1.2rem; font-weight: bold; color: #fff; display: block; margin-bottom: 2px; }
        .card-cat { font-size: 0.8rem; color: var(--accent); margin-bottom: 10px; display: block; font-weight: 500; }
        .card-valor { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .card-data { font-size: 0.75rem; color: #666; margin-bottom: 8px; }
        .card-parcelas { font-size: 0.85rem; color: var(--warning); font-weight: bold; background: rgba(255, 183, 77, 0.1); padding: 5px 10px; border-radius: 4px; display: inline-block; }

        /* Menu Inferior */
        nav {
            position: fixed; bottom: 0; width: 100%; background: var(--card);
            display: flex; justify-content: space-around; padding: 12px 0;
            border-top: 1px solid #333; z-index: 100;
        }
        .nav-item { background: none; border: none; color: #888; cursor: pointer; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }

        /* Input */
        #input-wrapper { position: fixed; bottom: 80px; width: 100%; padding: 0 20px; box-sizing: border-box; }
        .input-area { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; background: #252525; padding: 10px 18px; border-radius: 30px; border: 1px solid #333; }
        input { flex: 1; padding: 5px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <span class="label-saldo">Saldo Disponível</span>
        <span id="header-total" class="val-header">R$ 0,00</span>
    </div>
    <div style="background:#333; padding:5px 12px; border-radius:8px; font-size:0.8rem; font-weight:bold;">❮ MAR 2026 ❯</div>
</header>

<div id="view-chat" class="view active">
    <div id="chat-messages"></div>
    <div id="input-wrapper">
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ex: TV 2000 10x no Inter" onkeypress="if(event.key==='Enter') processInput()">
            <button onclick="processInput()" style="background:var(--primary); border:none; border-radius:50%; width:35px; height:35px; cursor:pointer; font-weight:bold;">➔</button>
        </div>
    </div>
</div>

<div id="view-saldo" class="view"><h3>Minhas Contas</h3></div>
<div id="view-resumo" class="view"><h3>Resumo</h3></div>
<div id="view-graficos" class="view"><h3>Gráficos</h3></div>

<nav>
    <button class="nav-item active" onclick="showView('chat', this)"><i>💬</i>Chat</button>
    <button class="nav-item" onclick="showView('saldo', this)"><i>💳</i>Saldos</button>
    <button class="nav-item" onclick="showView('resumo', this)"><i>📈</i>Resumo</button>
    <button class="nav-item" onclick="showView('graficos', this)"><i>📊</i>Gráficos</button>
</nav>

<script>
    let saldoGeral = 0;

    function showView(viewId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('input-wrapper').style.display = (viewId === 'chat') ? 'block' : 'none';
    }

    function processInput() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text) return;

        // Lógica de Extração
        const valorMatch = text.match(/(\d+[\d,.]*)/);
        let valorTotal = valorMatch ? parseFloat(valorMatch[0].replace(',', '.')) : 0;
        
        const parcelasMatch = text.toLowerCase().match(/(\d+)\s*(x|vezes)/);
        const numParcelas = parcelasMatch ? parseInt(parcelasMatch[1]) : 1;
        
        let tipo = text.toLowerCase().includes('recebi') ? 'receita' : 'despesa';
        if(numParcelas > 1) tipo = 'parcelado';

        let nome = text.replace(valorMatch ? valorMatch[0] : '', '')
                       .replace(/\d+\s*(x|vezes)/gi, '')
                       .replace(/(paguei|recebi|no|na|banco|nubank|inter)/gi, '').trim();

        let categoria = "GERAL";
        if(text.toLowerCase().includes("luz") || text.toLowerCase().includes("energia")) categoria = "CONTAS FIXAS / ENERGIA";
        if(text.toLowerCase().includes("mercado")) categoria = "ALIMENTAÇÃO";
        if(text.toLowerCase().includes("tv") || text.toLowerCase().includes("celular")) categoria = "ELETRÔNICOS";

        createCard(tipo, nome || "Movimentação", categoria, valorTotal, numParcelas);
        input.value = '';
    }

    function createCard(tipo, nome, categoria, valor, parcelas) {
        const container = document.getElementById('chat-messages');
        const cardId = 'card-' + Date.now();
        const dataAtual = new Date().toLocaleDateString('pt-BR');
        const valorParcela = (valor / parcelas).toLocaleString('pt-BR', {minimumFractionDigits: 2});

        const card = document.createElement('div');
        // Se for parcelado, usamos a cor de warning, senão receita ou despesa
        const classeCor = (parcelas > 1) ? 'parcelado' : tipo;
        card.className = `card-mov ${classeCor}`;
        card.id = cardId;

        card.innerHTML = `
            <div class="timer-bar" id="bar-${cardId}"></div>
            <div class="card-tipo">${tipo === 'receita' ? '💰 Receita' : '🛒 Despesa'}</div>
            <span class="card-nome">${nome}</span>
            <span class="card-cat">📂 ${categoria}</span>
            <div class="card-valor" style="color: ${tipo === 'receita' ? 'var(--primary)' : 'var(--text)'}">
                R$ ${valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
            </div>
            <div class="card-data">📅 Registro: ${dataAtual}</div>
            
            ${parcelas > 1 ? `<div class="card-parcelas">🔹 ${parcelas}x de R$ ${valorParcela}</div>` : ''}

            <div id="actions-${cardId}" style="margin-top:15px; display:flex; gap:10px;">
                <button onclick="confirmar('${cardId}', ${valor}, '${tipo}', ${parcelas})" style="background:var(--primary); border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; flex:1;">Confirmar</button>
                <button onclick="document.getElementById('${cardId}').remove()" style="background:rgba(255,255,255,0.05); border:1px solid #444; color:#aaa; padding:10px; border-radius:8px; cursor:pointer;">Excluir</button>
            </div>
        `;
        
        container.appendChild(card);
        container.scrollTop = container.scrollHeight;

        let timeLeft = 100;
        const interval = setInterval(() => {
            timeLeft -= 1.25;
            const bar = document.getElementById(`bar-${cardId}`);
            if(bar) bar.style.width = timeLeft + '%';
            if(timeLeft <= 0) {
                clearInterval(interval);
                confirmar(cardId, valor, tipo, parcelas);
            }
        }, 100);
        card.dataset.interval = interval;
    }

    function confirmar(id, valor, tipo, parcelas) {
        const card = document.getElementById(id);
        if(!card || card.dataset.confirmado) return;
        
        clearInterval(card.dataset.interval);
        card.dataset.confirmado = "true";
        
        // Regra: Parcelado não mexe no saldo agora
        if(parcelas === 1) {
            if(tipo === 'receita') saldoGeral += valor;
            else saldoGeral -= valor;
        }

        const bar = document.getElementById(`bar-${id}`);
        if(bar) bar.style.display = 'none';
        document.getElementById(`actions-${id}`).innerHTML = "<span style='color:var(--primary); font-size:0.85rem; font-weight:bold;'>✅ Registro Lançado</span>";
        
        document.getElementById('header-total').innerText = saldoGeral.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
</script>
</body>
</html>
