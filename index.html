<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Chat AI</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --primary: #00e676; 
            --secondary: #ff5252;
            --accent: #2979ff; 
            --warning: #ffb74d; 
            --recurring: #ba68c8; /* Roxo para recorrentes */
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            border-bottom: 1px solid #333;
        }

        .month-selector { display: flex; align-items: center; gap: 15px; font-weight: bold; }
        .btn-nav { background: #333; border: none; color: white; padding: 8px 12px; cursor: pointer; border-radius: 8px; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 100px;
        }

        .card-mov {
            background: var(--card);
            border-radius: 15px;
            padding: 18px;
            position: relative;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 6px solid var(--accent);
            animation: slideIn 0.3s ease-out;
        }

        .card-mov.receita { border-left-color: var(--primary); }
        .card-mov.despesa { border-left-color: var(--secondary); }
        .card-mov.parcelado { border-left-color: var(--warning); }
        .card-mov.recorrente { border-left-color: var(--recurring); }

        .timer-bar {
            position: absolute;
            top: 0; left: 0;
            height: 4px;
            background: var(--accent);
            width: 100%;
            border-radius: 15px 15px 0 0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #aaa;
            text-transform: uppercase;
        }

        .val-destaque { font-size: 1.3rem; font-weight: bold; color: #fff; margin: 10px 0; }

        .actions { margin-top: 15px; display: flex; gap: 10px; }
        .btn-action {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-edit { background: #333; color: white; }
        .btn-del { background: rgba(255, 82, 82, 0.15); color: var(--secondary); }
        .btn-recorrente { background: rgba(186, 104, 200, 0.2); color: var(--recurring); border: 1px solid var(--recurring); }

        .input-wrapper { position: fixed; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, var(--bg) 40%); box-sizing: border-box; }
        .input-area { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; background: #252525; padding: 8px 15px; border-radius: 30px; border: 1px solid #333; }
        input { flex: 1; padding: 10px; border: none; background: transparent; color: white; outline: none; }
        .btn-send { background: var(--primary); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } }
    </style>
</head>
<body>

<header>
    <div class="month-selector">
        <button class="btn-nav">❮</button>
        <span>MARÇO 2026</span>
        <button class="btn-nav">❯</button>
    </div>
    <div style="color: var(--primary); font-weight: bold;">R$ 5.200,00</div>
</header>

<div id="chat-container">
    <div class="card-mov" style="border-left-color: #555;">
        <p>👋 <strong>Dica de hoje:</strong></p>
        <p style="font-size: 0.9rem; color: #aaa;">Para contas fixas, diga: "Paguei internet 100 reais <b>todo mês</b>". Eu já agendo para os próximos meses!</p>
    </div>
</div>

<div class="input-wrapper">
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Fale sua movimentação..." onkeypress="if(event.key==='Enter') processInput()">
        <button class="btn-send" onclick="processInput()">➔</button>
    </div>
</div>

<script>
    function processInput() {
        const input = document.getElementById('user-input');
        if(!input.value.trim()) return;
        createCard(input.value.trim());
        input.value = '';
    }

    function createCard(text) {
        const container = document.getElementById('chat-container');
        const cardId = 'card-' + Date.now();
        const textoLimpo = text.toLowerCase();
        
        // Extração de dados
        const valorMatch = text.match(/(\d+[\d,.]*)/);
        let valorTotal = valorMatch ? parseFloat(valorMatch[0].replace(',', '.')) : 0;
        const parcelasMatch = textoLimpo.match(/(\d+)\s*(x|vezes)/);
        const numParcelas = parcelasMatch ? parseInt(parcelasMatch[1]) : 1;
        
        // Lógica de Recorrência
        const ehRecorrente = textoLimpo.includes("todo mês") || textoLimpo.includes("mensal") || textoLimpo.includes("fixa");
        
        let conta = textoLimpo.includes("inter") ? "Banco Inter" : (textoLimpo.includes("nubank") ? "Nubank" : "Carteira");
        let categoria = "Geral";
        if(textoLimpo.includes("internet") || textoLimpo.includes("net")) categoria = "Contas Fixas";
        if(textoLimpo.includes("aluguel")) categoria = "Moradia";
        if(textoLimpo.includes("academia")) categoria = "Saúde";

        const card = document.createElement('div');
        card.className = `card-mov ${ehRecorrente ? 'recorrente' : (numParcelas > 1 ? 'parcelado' : 'despesa')}`;
        card.id = cardId;
        
        card.innerHTML = `
            <div class="timer-bar" id="bar-${cardId}"></div>
            <div class="card-header">
                <span>📂 ${categoria}</span>
                <span>💳 ${conta}</span>
            </div>
            <div class="card-body">
                <div class="val-destaque">R$ ${valorTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                ${ehRecorrente ? `<p style="color: var(--recurring)">🔄 <b>Conta Recorrente:</b> Lançada para todos os meses.</p>` : 
                  (numParcelas > 1 ? `<p>🔹 ${numParcelas}x de R$ ${(valorTotal/numParcelas).toFixed(2).replace('.',',')}</p>` : `<p>🔹 Pagamento à vista</p>`)}
                
                <p style="font-size: 0.8rem; color: #888;">📅 Registro: ${new Date().toLocaleDateString('pt-BR')}</p>
            </div>
            <div class="actions" id="actions-${cardId}">
                ${(!ehRecorrente && categoria === "Geral") ? `<button class="btn-action btn-recorrente" onclick="setRecorrente('${cardId}')">Tornar Fixo? 🔄</button>` : ''}
                <button class="btn-action btn-edit" onclick="document.getElementById('${cardId}').remove()">✏️ Editar</button>
                <button class="btn-action btn-del" onclick="document.getElementById('${cardId}').remove()">🗑️ Excluir</button>
            </div>
        `;
        
        container.appendChild(card);
        container.scrollTop = container.scrollHeight;

        let timeLeft = 100;
        const bar = document.getElementById(`bar-${cardId}`);
        const interval = setInterval(() => {
            timeLeft -= 1.25;
            bar.style.width = timeLeft + '%';
            if (timeLeft <= 0) {
                clearInterval(interval);
                bar.style.display = 'none';
                document.getElementById(`actions-${cardId}`).innerHTML = "<span style='color: var(--primary); font-size: 0.85rem;'>✅ Confirmado</span>";
            }
        }, 100);
        card.dataset.interval = interval;
    }

    function setRecorrente(id) {
        const card = document.getElementById(id);
        clearInterval(card.dataset.interval); // Para o timer para o usuário ver a mudança
        card.className = "card-mov recorrente";
        card.querySelector('.card-body').innerHTML += `<p style="color: var(--recurring)">🔄 Alterado para recorrente!</p>`;
        document.getElementById(`actions-${id}`).innerHTML = "<span style='color: var(--primary); font-size: 0.85rem;'>✅ Salvo como Conta Fixa</span>";
    }
</script>
</body>
</html>
