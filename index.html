<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Chat AI</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1e1e1e;
            --text: #e0e0e0;
            --primary: #00e676; 
            --secondary: #ff5252;
            --accent: #2979ff; 
            --warning: #ffb74d; 
            --recurring: #ba68c8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            border-bottom: 1px solid #333;
        }

        .month-selector { display: flex; align-items: center; gap: 15px; font-weight: bold; }
        .btn-nav { background: #333; border: none; color: white; padding: 8px 12px; cursor: pointer; border-radius: 8px; }

        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 120px;
        }

        .card-mov {
            background: var(--card);
            border-radius: 12px;
            padding: 15px;
            position: relative;
            width: 95%;
            max-width: 450px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 6px solid var(--accent);
            animation: slideIn 0.3s ease-out;
        }

        .card-mov.receita { border-left-color: var(--primary); }
        .card-mov.despesa { border-left-color: var(--secondary); }
        .card-mov.parcelado { border-left-color: var(--warning); }
        .card-mov.recorrente { border-left-color: var(--recurring); }

        .timer-bar {
            position: absolute;
            top: 0; left: 0;
            height: 3px;
            background: var(--accent);
            width: 100%;
            border-radius: 12px 12px 0 0;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #888;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .despesa-nome {
            font-size: 1.1rem;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
            display: block;
        }

        .val-destaque { font-size: 1.4rem; font-weight: bold; color: var(--text); }

        .actions { margin-top: 12px; display: flex; gap: 8px; }
        .btn-action {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.8rem;
        }
        .btn-edit { background: #333; color: white; }
        .btn-del { background: rgba(255, 82, 82, 0.1); color: var(--secondary); border: 1px solid rgba(255, 82, 82, 0.2); }

        .input-wrapper { position: fixed; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, var(--bg) 40%); box-sizing: border-box; }
        .input-area { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; background: #252525; padding: 8px 15px; border-radius: 30px; border: 1px solid #333; }
        input { flex: 1; padding: 10px; border: none; background: transparent; color: white; outline: none; }
        .btn-send { background: var(--primary); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 1.2rem; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>

<header>
    <div class="month-selector">
        <button class="btn-nav">❮</button>
        <span>MARÇO 2026</span>
        <button class="btn-nav">❯</button>
    </div>
    <div style="color: var(--primary); font-weight: bold;">R$ 5.200,00</div>
</header>

<div id="chat-container">
    <div class="card-mov" style="border-left-color: #555;">
        <span class="despesa-nome">Assistente de Finanças</span>
        <p style="font-size: 0.9rem; color: #aaa; margin: 0;">Ex: "Paguei <b>Energia Elétrica Residencia</b> 250 no Nubank todo mês"</p>
    </div>
</div>

<div class="input-wrapper">
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Fale sua movimentação..." onkeypress="if(event.key==='Enter') processInput()">
        <button class="btn-send" onclick="processInput()">➔</button>
    </div>
</div>

<script>
    function processInput() {
        const input = document.getElementById('user-input');
        if(!input.value.trim()) return;
        createCard(input.value.trim());
        input.value = '';
    }

    function createCard(text) {
        const container = document.getElementById('chat-container');
        const cardId = 'card-' + Date.now();
        const textoOriginal = text;
        const textoLimpo = text.toLowerCase();
        
        // 1. Extração de Valor
        const valorMatch = text.match(/(\d+[\d,.]*)/);
        let valorTotal = valorMatch ? parseFloat(valorMatch[0].replace(',', '.')) : 0;
        
        // 2. Extração de Nome da Despesa (Remove valor, parcelas e comandos)
        let nomeDespesa = textoOriginal
            .replace(valorMatch ? valorMatch[0] : '', '')
            .replace(/\d+\s*(x|vezes)/gi, '')
            .replace(/(paguei|gastei|recebi|no|na|com|todo mês|mensal|fixa)/gi, '')
            .trim();
        
        if(!nomeDespesa) nomeDespesa = "Movimentação Geral";

        // 3. Categorização Inteligente
        let categoria = "Geral";
        if(textoLimpo.includes("energia") || textoLimpo.includes("luz") || textoLimpo.includes("água") || textoLimpo.includes("internet")) categoria = "Contas Fixas";
        if(textoLimpo.includes("residencia") || textoLimpo.includes("casa")) categoria += " / Residência";
        if(textoLimpo.includes("mercado") || textoLimpo.includes("comida")) categoria = "Alimentação";

        const parcelasMatch = textoLimpo.match(/(\d+)\s*(x|vezes)/);
        const numParcelas = parcelasMatch ? parseInt(parcelasMatch[1]) : 1;
        const ehRecorrente = textoLimpo.includes("todo mês") || textoLimpo.includes("mensal");
        let conta = textoLimpo.includes("inter") ? "Banco Inter" : (textoLimpo.includes("nubank") ? "Nubank" : "Carteira");

        const card = document.createElement('div');
        card.className = `card-mov ${ehRecorrente ? 'recorrente' : (numParcelas > 1 ? 'parcelado' : 'despesa')}`;
        card.id = cardId;
        
        card.innerHTML = `
            <div class="timer-bar" id="bar-${cardId}"></div>
            <div class="card-header">
                <span>📂 ${categoria}</span>
                <span>💳 ${conta}</span>
            </div>
            <span class="despesa-nome">${nomeDespesa}</span>
            <div class="card-body">
                <div class="val-destaque">R$ ${valorTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                <div style="font-size: 0.85rem; margin-top: 5px;">
                    ${ehRecorrente ? `<span style="color: var(--recurring)">🔄 Recorrente Mensal</span>` : 
                      (numParcelas > 1 ? `<span>🔹 ${numParcelas}x de R$ ${(valorTotal/numParcelas).toFixed(2).replace('.',',')}</span>` : `<span>🔹 Pagamento à vista</span>`)}
                </div>
                <p style="font-size: 0.75rem; color: #666; margin-top: 8px;">📅 Registro: ${new Date().toLocaleDateString('pt-BR')}</p>
            </div>
            <div class="actions" id="actions-${cardId}">
                <button class="btn-action btn-edit" onclick="document.getElementById('${cardId}').remove()">✏️ Editar</button>
                <button class="btn-action btn-del" onclick="document.getElementById('${cardId}').remove()">🗑️ Excluir</button>
            </div>
        `;
        
        container.appendChild(card);
        container.scrollTop = container.scrollHeight;

        let timeLeft = 100;
        const bar = document.getElementById(`bar-${cardId}`);
        const interval = setInterval(() => {
            timeLeft -= 1.25;
            bar.style.width = timeLeft + '%';
            if (timeLeft <= 0) {
                clearInterval(interval);
                bar.style.display = 'none';
                document.getElementById(`actions-${cardId}`).innerHTML = "<span style='color: var(--primary); font-size: 0.8rem;'>✅ Confirmado</span>";
            }
        }, 100);
        card.dataset.interval = interval;
    }
</script>
</body>
</html>
