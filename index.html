<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Chat AI</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
            --primary: #00e676; --secondary: #ff5252; --accent: #2979ff; 
            --warning: #ffb74d; --recurring: #ba68c8;
        }

        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-start;
            background: var(--card); border-bottom: 1px solid #333; z-index: 10;
        }

        .header-stats { display: flex; gap: 20px; }
        .stat-group { display: flex; flex-direction: column; }
        .label-small { font-size: 0.6rem; color: #888; text-transform: uppercase; font-weight: bold; }
        .val-header { font-size: 1.1rem; font-weight: bold; }
        .val-saldo { color: var(--primary); }
        .val-fatura { color: var(--warning); }

        .header-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; }
        .btn-zerar { background: rgba(255, 82, 82, 0.1); border: 1px solid var(--secondary); color: var(--secondary); font-size: 0.6rem; padding: 4px 8px; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-weight: bold; }

        .view { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding: 20px; padding-bottom: 160px; }
        .view.active { display: flex; }

        .card-mov {
            background: var(--card); border-radius: 12px; padding: 18px; position: relative;
            width: 100%; max-width: 450px; margin-bottom: 15px; border-left: 6px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease;
        }
        .card-mov.receita { border-left-color: var(--primary); }
        .card-mov.despesa { border-left-color: var(--secondary); }
        .card-mov.parcelado { border-left-color: var(--warning); }

        .timer-bar { position: absolute; top: 0; left: 0; height: 3px; background: var(--accent); width: 100%; border-radius: 12px 12px 0 0; transition: width 0.1s linear; }

        .card-tipo { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: #888; margin-bottom: 4px; }
        .card-nome { font-size: 1.2rem; font-weight: bold; color: #fff; display: block; }
        .card-cat { font-size: 0.8rem; color: var(--accent); margin-bottom: 10px; display: block; }
        .card-valor { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .card-data { font-size: 0.75rem; color: #666; margin-bottom: 10px; }
        
        .opt-recorrente { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; margin-bottom: 15px; color: var(--recurring); cursor: pointer; font-weight: bold; }
        .card-parcela-info { background: rgba(255, 183, 77, 0.1); color: var(--warning); padding: 8px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; margin-bottom: 10px; }

        #input-wrapper { position: fixed; bottom: 80px; width: 100%; padding: 0 20px; box-sizing: border-box; }
        .input-area { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; background: #252525; padding: 10px 18px; border-radius: 30px; border: 1px solid #333; }
        input { flex: 1; padding: 5px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { background: none; border: none; color: #888; cursor: pointer; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>

<header>
    <div class="header-stats">
        <div class="stat-group">
            <span class="label-small">Saldo Disponível</span>
            <span id="header-total" class="val-header val-saldo">R$ 0,00</span>
        </div>
        <div class="stat-group">
            <span class="label-small">Fatura <span id="label-mes-fatura">MARÇO</span></span>
            <span id="header-fatura" class="val-header val-fatura">R$ 0,00</span>
        </div>
    </div>
    <div class="header-actions">
        <button class="btn-zerar" onclick="zerarSistema()">🗑️ Zerar Sistema</button>
        <div style="font-size:0.7rem; font-weight:bold; color:#666;">07/03/2026</div>
    </div>
</header>

<div id="view-chat" class="view active">
    <div id="chat-messages"></div>
    <div id="input-wrapper">
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ex: Tv 2000 em três vezes" onkeypress="if(event.key==='Enter') processInput()">
            <button onclick="processInput()" style="background:var(--primary); border:none; border-radius:50%; width:35px; height:35px; cursor:pointer;">➔</button>
        </div>
    </div>
</div>

<div id="view-saldo" class="view"><h3>Minhas Contas</h3></div>
<div id="view-resumo" class="view"><h3>Resumo Mensal</h3></div>
<div id="view-graficos" class="view"><h3>Relatórios</h3></div>

<nav>
    <button class="nav-item active" onclick="showView('chat', this)"><i>💬</i>Chat</button>
    <button class="nav-item" onclick="showView('saldo', this)"><i>💳</i>Saldos</button>
    <button class="nav-item" onclick="showView('resumo', this)"><i>📈</i>Resumo</button>
    <button class="nav-item" onclick="showView('graficos', this)"><i>📊</i>Gráficos</button>
</nav>

<script>
    let transacoes = [];
    let saldoBase = 0; 

    const extensoNumeros = {
        "uma": 1, "duas": 2, "três": 3, "quatro": 4, "cinco": 5, "seis": 6, 
        "sete": 7, "oito": 8, "nove": 9, "dez": 10, "onze": 11, "doze": 12
    };

    function format(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function zerarSistema() {
        if(confirm("Deseja limpar todos os dados e zerar o saldo?")) {
            transacoes = [];
            saldoBase = 0;
            document.getElementById('chat-messages').innerHTML = "";
            updateUI();
        }
    }

    function capitalizeFirstLetter(string) {
        if (!string) return "";
        return string.charAt(0).toUpperCase() + string.slice(1);
    }

    function updateUI() {
        let totalFaturaMes = 0;
        transacoes.forEach(t => {
            if (t.confirmada && t.parcelas > 1) {
                totalFaturaMes += (t.valor / t.parcelas);
            }
        });
        document.getElementById('header-total').innerText = format(saldoBase);
        document.getElementById('header-fatura').innerText = format(totalFaturaMes);
    }

    function processInput() {
        const input = document.getElementById('user-input');
        let text = input.value.trim();
        if(!text) return;

        // LIMPAR O INPUT IMEDIATAMENTE APÓS PEGAR O TEXTO
        input.value = '';

        const valorMatch = text.match(/(\d+[\d,.]*)/);
        let valorTotal = valorMatch ? parseFloat(valorMatch[0].replace(',', '.')) : 0;
        
        let numParcelas = 1;
        const parcelasMatch = text.toLowerCase().match(/(\d+)\s*(x|vezes)/);
        
        if (parcelasMatch) {
            numParcelas = parseInt(parcelasMatch[1]);
        } else {
            for (let word in extensoNumeros) {
                if (text.toLowerCase().includes(word + " vezes")) {
                    numParcelas = extensoNumeros[word];
                    break;
                }
            }
        }
        
        let tipo = text.toLowerCase().includes('recebi') ? 'receita' : 'despesa';
        
        let nomeRaw = text.replace(valorMatch ? valorMatch[0] : '', '')
                          .replace(/\d+\s*(x|vezes)/gi, '')
                          .replace(/(paguei|recebi|gastei|no|na|vezes|em|dividido)/gi, '');
        
        for (let word in extensoNumeros) { nomeRaw = nomeRaw.replace(word, ""); }
        
        let nomeFinal = capitalizeFirstLetter(nomeRaw.trim() || "Lançamento");

        createCard({
            id: Date.now(),
            nome: nomeFinal,
            valor: valorTotal,
            tipo: tipo,
            parcelas: numParcelas,
            dataRegistro: "07/03/2026",
            recorrente: false,
            confirmada: false
        });
    }

    function createCard(t) {
        const container = document.getElementById('chat-messages');
        const cardId = t.id;
        const card = document.createElement('div');
        card.className = `card-mov ${t.parcelas > 1 ? 'parcelado' : t.tipo}`;
        card.id = cardId;

        card.innerHTML = `
            <div class="timer-bar" id="bar-${cardId}"></div>
            <div class="card-tipo">${t.tipo === 'receita' ? '💰 Receita' : '🛒 Despesa'}</div>
            <span class="card-nome">${t.nome}</span>
            <span class="card-cat">📂 GERAL</span>
            <div class="card-valor">R$ ${t.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
            <div class="card-data">📅 Registro: ${t.dataRegistro}</div>
            
            ${t.parcelas > 1 ? `<div class="card-parcela-info">💳 Parcelas: ${t.parcelas}x de R$ ${(t.valor/t.parcelas).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>` : ''}

            <label class="opt-recorrente">
                <input type="checkbox" onchange="toggleRecorrente(${cardId}, this.checked)"> 🔄 Recorrente mensal?
            </label>

            <div id="actions-${cardId}" style="display:flex; gap:10px;">
                <button onclick="confirmar(${cardId})" style="background:var(--primary); border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; flex:1;">Confirmar</button>
                <button onclick="excluirCard(${cardId})" style="background:rgba(255,255,255,0.05); border:1px solid #444; color:#aaa; padding:10px; border-radius:8px; cursor:pointer;">Excluir</button>
            </div>
        `;
        
        container.appendChild(card);
        container.scrollTop = container.scrollHeight;

        let timeLeft = 100;
        const interval = setInterval(() => {
            timeLeft -= 1; 
            const bar = document.getElementById(`bar-${cardId}`);
            if(bar) bar.style.width = timeLeft + '%';
            if(timeLeft <= 0) {
                clearInterval(interval);
                confirmar(cardId);
            }
        }, 100); 
        card.dataset.interval = interval;
        transacoes.push(t);
    }

    function toggleRecorrente(id, checked) {
        let t = transacoes.find(x => x.id === id);
        if(t) t.recorrente = checked;
    }

    function excluirCard(id) {
        const card = document.getElementById(id);
        if(card) {
            clearInterval(card.dataset.interval);
            card.remove();
            transacoes = transacoes.filter(t => t.id !== id);
        }
    }

    function confirmar(id) {
        const card = document.getElementById(id);
        let t = transacoes.find(x => x.id === id);
        
        if(!t || t.confirmada) return;
        
        clearInterval(card.dataset.interval);
        t.confirmada = true;

        if(t.tipo === 'receita') {
            saldoBase += t.valor;
        } else if (t.parcelas === 1) {
            saldoBase -= t.valor;
        }

        const bar = document.getElementById(`bar-${id}`);
        if(bar) bar.style.display = 'none';
        document.getElementById(`actions-${id}`).innerHTML = `
            <span style="color:var(--primary); font-size:0.85rem; font-weight:bold;">
                ✅ Processado ${t.recorrente ? '(Recorrente)' : ''}
            </span>
        `;
        updateUI();
    }

    function showView(viewId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('input-wrapper').style.display = (viewId === 'chat') ? 'block' : 'none';
    }

    updateUI();
</script>
</body>
</html>
