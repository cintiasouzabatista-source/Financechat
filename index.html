<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; margin: 0; display: flex; height: 100vh; overflow: hidden; color: #333; }
        
        /* SIDEBAR COMPACTA */
        .sidebar { width: 240px; background: white; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; padding: 2rem 1rem; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.2rem; text-transform: uppercase; margin-bottom: 3rem; padding-left: 1rem; letter-spacing: -0.05em; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 0.7rem 1.2rem; border-radius: 1rem; color: #888; font-weight: 600; font-size: 13px; margin-bottom: 0.4rem; cursor: pointer; }
        .nav-item.active { background: #f4f4f4; color: #1d3b91; }

        /* ÁREA CENTRALIZADA (TIPO CARD) */
        .main-content { flex: 1; overflow-y: auto; padding: 3rem 2rem; display: flex; flex-direction: column; align-items: center; }
        .dashboard-card { width: 100%; max-width: 700px; background: transparent; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3rem; }
        .dashboard-label { font-weight: 700; color: #d0d0d0; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.75rem; }
        .balance-val { font-weight: 800; font-size: 1.6rem; letter-spacing: -0.02em; }

        /* CHAT E BOTÕES RÁPIDOS */
        .btn-quick { background: #f4f4f4; border-radius: 2rem; padding: 0.5rem 1rem; font-size: 10px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 6px; border: 1px solid transparent; transition: 0.2s; }
        .btn-quick:hover { border-color: #1d3b91; color: #1d3b91; background: white; }
        .input-chat { background-color: #f4f4f4; border: none; border-radius: 1.2rem; padding: 1.2rem 1.8rem; width: 100%; outline: none; font-size: 0.95rem; }

        /* REVISÃO */
        .card-revisao { background: white; border-radius: 2rem; padding: 2rem; border: 1px solid #f2f2f2; box-shadow: 0 15px 30px rgba(0,0,0,0.03); position: relative; overflow: hidden; margin-top: 1.5rem; }
        .progress-bar { height: 5px; background-color: #1d3b91; width: 100%; position: absolute; bottom: 0; left: 0; transition: width 8s linear; }
        
        /* LISTA */
        .mov-card { background: white; border-radius: 1.5rem; padding: 1.2rem 1.8rem; border: 1px solid #f9f9f9; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.6rem; }
        .mov-desc { font-weight: 700; font-size: 0.8rem; text-transform: uppercase; }
        .mov-val { font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">Finance</div>
        <nav>
            <div class="nav-item active"><span>💬</span> Chat</div>
            <div class="nav-item"><span>📊</span> Saldos</div>
            <div class="nav-item"><span>📅</span> Calendário</div>
            <div class="nav-item"><span>⚙️</span> Ajustes</div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="dashboard-card">
            <header class="header">
                <h2 class="dashboard-label">Dashboard</h2>
                <div class="text-right">
                    <p class="text-[9px] font-bold text-gray-300 uppercase tracking-widest mb-1">Saldo Atual</p>
                    <p id="saldo-topo" class="balance-val text-green-500">R$ 0,00</p>
                </div>
            </header>

            <div class="flex flex-wrap gap-2 mb-6">
                <button onclick="comando('Salário 5000')" class="btn-quick !bg-green-50 text-green-700">💰 Salário</button>
                <button onclick="comando('Uber 25')" class="btn-quick">🚗 Uber</button>
                <button onclick="comando('iFood 60')" class="btn-quick">🍕 iFood</button>
                <button onclick="comando('Mercado 150')" class="btn-quick">🛒 Mercado</button>
            </div>

            <div id="box-entrada">
                <input type="text" id="chat-input" class="input-chat" placeholder="Ex: paguei 300 mercado ou recebi 5000 salario">
            </div>

            <div id="card-revisao" class="hidden card-revisao">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-gray-300 text-[9px] font-bold uppercase tracking-widest">Revisar</span>
                    <span id="label-tipo" class="px-3 py-1 rounded-full text-[9px] font-bold uppercase"></span>
                </div>
                <div class="space-y-5">
                    <input id="rev-desc" type="text" class="input-chat font-bold uppercase text-lg !bg-white border border-gray-100" onfocus="pausar()">
                    <div class="flex gap-4">
                        <input id="rev-valor" type="text" class="input-chat flex-1 font-bold !bg-white border border-gray-100" oninput="recalc()">
                        <input id="rev-parc" type="text" class="input-chat w-20 text-center font-bold !bg-white border border-gray-100" value="1">
                    </div>
                    <div class="flex justify-between items-center pt-4">
                        <button onclick="cancelar()" class="text-red-400 font-bold text-[10px] uppercase">Excluir</button>
                        <button onclick="confirmar()" class="bg-black text-white px-10 py-3 rounded-xl text-[10px] font-bold uppercase shadow-lg">Confirmar</button>
                    </div>
                </div>
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <div id="historico" class="mt-12">
                <h3 class="text-[9px] font-bold text-gray-300 uppercase tracking-widest mb-5 ml-2">Histórico Recente</h3>
                <div id="lista-mov"></div>
            </div>
        </div>
    </main>

    <script>
        let dados = JSON.parse(localStorage.getItem('fin_v5')) || [];
        let tAtivo = null;

        window.onload = render;

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') comando(e.target.value);
        });

        function comando(t) {
            const v = (t.match(/\d+/) || [0])[0];
            const d = t.split(' ')[0].toUpperCase();
            // Lógica de Categorização Corrigida
            const tipo = (d.includes('SALARI') || d.includes('RECEB') || d.includes('PIX RECEB')) ? 'entrada' : 'saida';
            
            document.getElementById('rev-desc').value = d;
            document.getElementById('rev-valor').value = parseFloat(v).toFixed(2);
            document.getElementById('label-tipo').innerText = tipo === 'entrada' ? 'RECEITA' : 'DESPESA';
            document.getElementById('label-tipo').className = `px-3 py-1 rounded-full text-[9px] font-bold uppercase ${tipo === 'entrada' ? 'bg-green-100 text-green-600' : 'bg-red-100 text-red-600'}`;
            
            document.getElementById('box-entrada').classList.add('hidden');
            document.getElementById('card-revisao').classList.remove('hidden');
            startTimer();
        }

        function startTimer() {
            const bar = document.getElementById('progress-bar');
            bar.style.display = 'block'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 8s linear'; bar.style.width = '0%'; }, 50);
            tAtivo = setTimeout(confirmar, 8000);
        }

        function pausar() { clearTimeout(tAtivo); document.getElementById('progress-bar').style.display = 'none'; }

        function confirmar() {
            const desc = document.getElementById('rev-desc').value;
            const valor = parseFloat(document.getElementById('rev-valor').value);
            const tipo = document.getElementById('label-tipo').innerText === 'RECEITA' ? 'entrada' : 'saida';
            
            dados.push({ id: Date.now(), desc, valor, tipo });
            localStorage.setItem('fin_v5', JSON.stringify(dados));
            render(); cancelar();
        }

        function cancelar() {
            clearTimeout(tAtivo);
            document.getElementById('card-revisao').classList.add('hidden');
            document.getElementById('box-entrada').classList.remove('hidden');
            document.getElementById('chat-input').value = '';
        }

        function render() {
            const l = document.getElementById('lista-mov');
            let saldo = 0; l.innerHTML = '';
            dados.slice().reverse().forEach(t => {
                saldo += (t.tipo === 'entrada' ? t.valor : -t.valor);
                l.innerHTML += `
                    <div class="mov-card">
                        <div><p class="mov-desc">${t.desc}</p><p class="text-[9px] text-gray-300 font-bold uppercase">Hoje</p></div>
                        <p class="mov-val ${t.tipo === 'entrada' ? 'text-green-500' : 'text-red-500'}">${t.tipo === 'entrada' ? '+' : '-'} R$ ${t.valor.toFixed(2)}</p>
                    </div>`;
            });
            const sEl = document.getElementById('saldo-topo');
            sEl.innerText = `R$ ${saldo.toFixed(2)}`;
            sEl.className = `balance-val ${saldo >= 0 ? 'text-green-500' : 'text-red-500'}`;
        }
    </script>
</body>
</html>
