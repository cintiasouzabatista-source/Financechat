<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Assistant Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; color: #1a1a1a; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR PROFISSIONAL */
        .sidebar { width: 280px; background: white; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; padding: 2.5rem 1rem; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.5rem; text-transform: uppercase; margin-bottom: 3.5rem; padding-left: 1.5rem; letter-spacing: -0.05em; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 0.9rem 1.5rem; border-radius: 1.2rem; color: #888; font-weight: 600; font-size: 14px; margin-bottom: 0.5rem; cursor: pointer; transition: 0.2s; }
        .nav-item.active { background: #f4f4f4; color: #1d3b91; }

        /* ÁREA PRINCIPAL */
        .main-content { flex: 1; overflow-y: auto; padding: 4rem 5%; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 100%; max-width: 850px; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4rem; }
        .dashboard-label { font-weight: 700; color: #c0c0c0; text-transform: uppercase; letter-spacing: 0.2em; font-size: 0.8rem; }
        .balance-val { font-weight: 800; font-size: 2rem; letter-spacing: -0.02em; }

        /* CHAT E BOTÕES */
        .input-finance { background-color: #f4f4f4; border: none; border-radius: 1.5rem; padding: 1.5rem 2rem; width: 100%; outline: none; font-size: 1.1rem; }
        .btn-cat { background: #f4f4f4; border-radius: 2rem; padding: 0.6rem 1.2rem; font-size: 11px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 8px; border: 1px solid transparent; transition: 0.2s; }
        .btn-cat:hover { border-color: #1d3b91; color: #1d3b91; background: white; }

        /* CARD REVISÃO */
        .card-revisao { background: white; border-radius: 2.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.04); padding: 2.5rem; border: 1px solid #f2f2f2; position: relative; overflow: hidden; margin-top: 2rem; }
        .progress-bar { height: 6px; background-color: #1d3b91; width: 100%; position: absolute; bottom: 0; left: 0; transition: width 8s linear; }
        
        /* HISTÓRICO */
        .movimentacao-card { background: white; border-radius: 1.8rem; padding: 1.5rem 2.2rem; border: 1px solid #f9f9f9; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">Finance</div>
        <nav class="flex-1">
            <div class="nav-item active"><span>💬</span> Chat</div>
            <div class="nav-item"><span>📊</span> Saldos</div>
            <div class="nav-item"><span>📅</span> Calendário</div>
            <div class="nav-item"><span>⚙️</span> Ajustes</div>
        </nav>
    </aside>

    <main class="main-content">
        <div class="wrapper">
            <header class="header">
                <h2 class="dashboard-label">Dashboard</h2>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1">Balanço do Mês</p>
                    <p id="saldo-topo" class="balance-val text-green-500">R$ 0,00</p>
                </div>
            </header>

            <div class="flex flex-wrap gap-3 mb-8">
                <button onclick="comandoRapido('Salário 5000')" class="btn-cat !bg-green-50 text-green-700">💰 Salário</button>
                <button onclick="comandoRapido('Uber 25')" class="btn-cat">🚗 Uber</button>
                <button onclick="comandoRapido('iFood 60')" class="btn-cat">🍕 iFood</button>
                <button onclick="comandoRapido('Mercado 150')" class="btn-cat">🛒 Mercado</button>
                <button onclick="comandoRapido('Internet 99')" class="btn-cat">🌐 Internet</button>
            </div>

            <div id="container-entrada">
                <p class="text-[10px] font-bold text-gray-300 uppercase tracking-[0.2em] mb-4 ml-6">O que aconteceu agora?</p>
                <input type="text" id="chat-input" class="input-finance shadow-sm" placeholder="Ex: paguei 300 mercado ou recebi 5000 salario">
            </div>

            <div id="card-revisao" class="hidden card-revisao animate-in fade-in zoom-in duration-300">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-gray-400 text-[10px] font-bold uppercase tracking-widest">Revisar Lançamento</span>
                    <span id="label-parcelas" class="text-gray-400 text-[10px] font-bold uppercase">1X DE R$ 0,00</span>
                </div>
                <div class="space-y-6">
                    <input id="rev-desc" type="text" class="input-finance font-bold uppercase text-2xl" onfocus="pausar()">
                    <div class="flex gap-4">
                        <input id="rev-valor" type="text" class="input-finance flex-1 font-bold text-blue-900" oninput="recalc()">
                        <input id="rev-parcelas" type="text" class="input-finance w-24 text-center font-bold" value="1" oninput="recalc()">
                    </div>
                    <div class="flex justify-between items-center pt-8">
                        <button onclick="cancelar()" class="text-red-400 font-bold text-[10px] uppercase tracking-widest">Excluir</button>
                        <button onclick="confirmar()" class="bg-[#1a1a1a] text-white px-14 py-4 rounded-2xl text-[10px] font-bold uppercase shadow-xl">Confirmar</button>
                    </div>
                </div>
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <section id="dashboard-data" class="mt-16">
                <div class="bg-white p-10 rounded-[3rem] border border-gray-50 shadow-sm mb-12">
                    <h3 class="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-10 text-center">Resumo por Categoria (%)</h3>
                    <div id="container-grafico" class="space-y-8"></div>
                </div>

                <h2 class="font-bold text-[11px] uppercase tracking-widest text-gray-300 mb-6 ml-4">Histórico Recente</h2>
                <div id="lista-movimentacoes" class="space-y-3"></div>
            </section>
        </div>
    </main>

    <script>
        let transacoes = JSON.parse(localStorage.getItem('fin_v4')) || [];
        let tAtivo = null;

        window.onload = render;

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && e.target.value) processar(e.target.value);
        });

        function comandoRapido(t) { processar(t); }

        function processar(texto) {
            const val = (texto.match(/\d+/) || [0])[0];
            const desc = texto.split(' ')[0].toUpperCase();
            
            document.getElementById('rev-desc').value = desc;
            document.getElementById('rev-valor').value = parseFloat(val).toFixed(2);
            document.getElementById('container-entrada').classList.add('hidden');
            document.getElementById('card-revisao').classList.remove('hidden');
            document.getElementById('dashboard-data').classList.add('opacity-10');
            
            iniciarTimer();
            recalc();
        }

        function iniciarTimer() {
            const bar = document.getElementById('progress-bar');
            bar.style.display = 'block'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 8s linear'; bar.style.width = '0%'; }, 50);
            tAtivo = setTimeout(confirmar, 8000);
        }

        function pausar() { clearTimeout(tAtivo); document.getElementById('progress-bar').style.display = 'none'; }

        function confirmar() {
            const desc = document.getElementById('rev-desc').value;
            const valor = parseFloat(document.getElementById('rev-valor').value);
            // Inteligência: Se a descrição for SALARIO ou RECEBI, é entrada
            const tipo = (desc.includes('SALARIO') || desc.includes('RECEB')) ? 'entrada' : 'saida';
            
            transacoes.push({ id: Date.now(), desc, valor, tipo, data: new Date() });
            localStorage.setItem('fin_v4', JSON.stringify(transacoes));
            render(); cancelar();
        }

        function cancelar() {
            clearTimeout(tAtivo);
            document.getElementById('card-revisao').classList.add('hidden');
            document.getElementById('container-entrada').classList.remove('hidden');
            document.getElementById('dashboard-data').classList.remove('opacity-10');
            document.getElementById('chat-input').value = '';
        }

        function render() {
            const list = document.getElementById('lista-movimentacoes');
            const graf = document.getElementById('container-grafico');
            let saldo = 0; let cats = {}; let totalGasto = 0;

            list.innerHTML = ''; graf.innerHTML = '';
            transacoes.slice().reverse().forEach(t => {
                if(t.tipo === 'entrada') saldo += t.valor;
                else { 
                    saldo -= t.valor; 
                    totalGasto += t.valor;
                    cats[t.desc] = (cats[t.desc] || 0) + t.valor;
                }
                
                list.innerHTML += `
                    <div class="movimentacao-card">
                        <div><p class="font-bold text-xs uppercase">${t.desc}</p><p class="text-[10px] text-gray-300 font-bold uppercase">Hoje</p></div>
                        <p class="font-bold ${t.tipo === 'entrada' ? 'text-green-500' : 'text-red-500'}">${t.tipo === 'entrada' ? '+' : '-'} R$ ${t.valor.toFixed(2)}</p>
                    </div>`;
            });

            const saldoEl = document.getElementById('saldo-topo');
            saldoEl.innerText = `R$ ${saldo.toFixed(2)}`;
            saldoEl.className = `balance-val ${saldo >= 0 ? 'text-green-500' : 'text-red-500'}`;

            for(let c in cats) {
                const p = ((cats[c]/totalGasto)*100).toFixed(1);
                graf.innerHTML += `
                    <div class="space-y-2">
                        <div class="flex justify-between text-[10px] font-bold uppercase"><span>${c}</span><span>${p}%</span></div>
                        <div class="w-full bg-gray-50 h-1.5 rounded-full overflow-hidden"><div class="bg-[#1d3b91] h-full" style="width:${p}%"></div></div>
                    </div>`;
            }
        }

        function recalc() {
            const v = parseFloat(document.getElementById('rev-valor').value) || 0;
            const p = parseInt(document.getElementById('rev-parcelas').value) || 1;
            document.getElementById('label-parcelas').innerText = `${p}X DE R$ ${(v/p).toFixed(2)}`;
        }
    </script>
</body>
</html>
