<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Barra Lateral */
        .sidebar { width: 260px; background-color: white; border-right: 1px solid #f0f0f0; display: flex; flex-direction: column; padding: 2rem; }
        .nav-item { padding: 0.8rem 1rem; border-radius: 1rem; font-size: 13px; font-weight: 600; color: #999; cursor: pointer; transition: all 0.2s; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 10px; }
        .nav-item.active { background-color: #f4f4f4; color: #1d3b91; }
        
        /* Área Principal */
        .main-content { flex: 1; overflow-y: auto; padding: 3rem; display: flex; flex-direction: column; }
        
        /* Elementos do Chat */
        .chat-container { max-width: 800px; margin: 0 auto; width: 100%; }
        .input-finance { background-color: #f4f4f4; border: none; border-radius: 1.5rem; padding: 1.5rem; width: 100%; outline: none; font-size: 16px; }
        
        /* Card de Revisão */
        .card-revisao { background: white; border-radius: 2.5rem; padding: 2.5rem; border: 1px solid #f0f0f0; box-shadow: 0 10px 30px rgba(0,0,0,0.03); position: relative; overflow: hidden; margin-top: 2rem; }
        .progress-bar { height: 5px; background-color: #1d3b91; width: 100%; position: absolute; bottom: 0; left: 0; transition: width 8s linear; }
        
        /* Gráfico */
        .chart-bar { height: 8px; border-radius: 10px; background-color: #1d3b91; transition: width 1s ease-out; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h1 class="font-bold text-xl tracking-tighter uppercase mb-12">Finance</h1>
        <nav class="flex-1">
            <div class="nav-item active">💬 Chat</div>
            <div class="nav-item">📊 Saldos</div>
            <div class="nav-item">📅 Calendário</div>
            <div class="nav-item">⚙️ Ajustes</div>
        </nav>
        <div class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Versão Teste 1.0</div>
    </aside>

    <main class="main-content">
        <header class="flex justify-between items-center mb-12 max-w-[800px] mx-auto w-full">
            <h2 class="font-bold text-lg uppercase tracking-widest text-gray-400">Dashboard</h2>
            <div class="text-right">
                <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Balanço do Mês</p>
                <p id="saldo-topo" class="text-green-500 font-bold text-2xl leading-none">R$ 0,00</p>
            </div>
        </header>

        <div class="chat-container">
            <div class="flex flex-wrap gap-3 mb-6">
                <button onclick="comandoRapido('Uber 25')" class="bg-gray-100 px-4 py-2 rounded-full text-[11px] font-bold uppercase hover:bg-gray-200">🚗 Uber</button>
                <button onclick="comandoRapido('iFood 60')" class="bg-gray-100 px-4 py-2 rounded-full text-[11px] font-bold uppercase hover:bg-gray-200">🍕 iFood</button>
            </div>

            <div id="input-area">
                <input type="text" id="chat-input" class="input-finance" placeholder="Ex: paguei 300 mercado">
            </div>

            <div id="card-revisao" class="hidden card-revisao animate-in fade-in zoom-in duration-300">
                <div class="flex justify-between mb-8">
                    <span class="text-gray-400 text-[11px] font-bold uppercase">Revisar Lançamento</span>
                    <span id="label-parcelas" class="text-gray-400 text-[11px] font-bold uppercase">1X DE R$ 0,00</span>
                </div>
                <div class="space-y-6">
                    <input id="rev-desc" type="text" class="input-finance font-bold uppercase" onfocus="pararTimer()">
                    <div class="flex gap-4">
                        <input id="rev-valor" type="text" class="input-finance flex-1" oninput="atualizarLabel()">
                        <input id="rev-parc" type="text" class="input-finance w-24 text-center" value="1" oninput="atualizarLabel()">
                    </div>
                    <div class="flex gap-4">
                        <input id="rev-cat" type="text" class="input-finance flex-1 text-sm uppercase" readonly>
                        <select id="rev-fixa" class="input-finance flex-1 text-sm font-bold text-blue-600">
                            <option value="nao">NÃO É FIXA</option>
                            <option value="sim">LANÇAR 12 MESES</option>
                        </select>
                    </div>
                    <div class="flex justify-between pt-4">
                        <button onclick="cancelar()" class="text-red-500 font-bold text-[11px] uppercase">Excluir</button>
                        <button onclick="confirmar()" class="bg-black text-white px-10 py-4 rounded-2xl text-[11px] font-bold uppercase">Confirmar</button>
                    </div>
                </div>
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <div id="dashboard-info" class="mt-12 space-y-10">
                <div class="bg-white p-8 rounded-[2rem] border border-gray-50">
                    <h3 class="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-8 text-center">Resumo de Gastos (%)</h3>
                    <div id="container-grafico" class="space-y-6"></div>
                </div>
                <div id="lista-movimentacoes" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <script>
        let transacoes = [];
        let timer = null;

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') processar(e.target.value);
        });

        function comandoRapido(t) { processar(t); }

        function processar(texto) {
            const vMatch = texto.match(/\d+/);
            const valor = vMatch ? parseFloat(vMatch[0]) : 0;
            const desc = texto.split(' ')[0].toUpperCase();

            document.getElementById('rev-desc').value = desc;
            document.getElementById('rev-valor').value = valor.toFixed(2);
            document.getElementById('rev-cat').value = desc;
            
            document.getElementById('input-area').classList.add('hidden');
            document.getElementById('card-revisao').classList.remove('hidden');
            document.getElementById('dashboard-info').classList.add('opacity-20');
            
            iniciarTimer();
            atualizarLabel();
        }

        function iniciarTimer() {
            const bar = document.getElementById('progress-bar');
            bar.style.transition = 'none'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 8s linear'; bar.style.width = '0%'; }, 50);
            timer = setTimeout(confirmar, 8000);
        }

        function pararTimer() { 
            clearTimeout(timer); 
            document.getElementById('progress-bar').style.display = 'none'; 
        }

        function confirmar() {
            const t = {
                desc: document.getElementById('rev-desc').value,
                valor: parseFloat(document.getElementById('rev-valor').value),
                cat: document.getElementById('rev-cat').value,
                fixa: document.getElementById('rev-fixa').value === 'sim'
            };
            transacoes.push(t);
            renderizar();
            cancelar();
        }

        function cancelar() {
            clearTimeout(timer);
            document.getElementById('card-revisao').classList.add('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('dashboard-info').classList.remove('opacity-20');
            document.getElementById('chat-input').value = '';
        }

        function renderizar() {
            const lista = document.getElementById('lista-movimentacoes');
            const graf = document.getElementById('container-grafico');
            let total = 0; let cats = {};

            lista.innerHTML = '';
            transacoes.forEach(t => {
                total += t.valor;
                cats[t.cat] = (cats[t.cat] || 0) + t.valor;
                lista.innerHTML += `
                    <div class="movimentacao-card">
                        <span class="font-bold text-xs uppercase">${t.desc}</span>
                        <span class="font-bold text-red-500">- R$ ${t.valor.toFixed(2)}</span>
                    </div>`;
            });

            document.getElementById('saldo-topo').innerText = `- R$ ${total.toFixed(2)}`;
            
            graf.innerHTML = '';
            for(let c in cats) {
                const perc = ((cats[c]/total)*100).toFixed(1);
                graf.innerHTML += `
                    <div class="space-y-2">
                        <div class="flex justify-between text-[10px] font-bold uppercase"><span>${c}</span><span>${perc}%</span></div>
                        <div class="w-full bg-gray-50 h-2 rounded-full"><div class="chart-bar" style="width:${perc}%"></div></div>
                    </div>`;
            }
        }

        function atualizarLabel() {
            const v = parseFloat(document.getElementById('rev-valor').value) || 0;
            const p = parseInt(document.getElementById('rev-parc').value) || 1;
            document.getElementById('label-parcelas').innerText = `${p}X DE R$ ${(v/p).toFixed(2)}`;
        }
    </script>
</body>
</html>
