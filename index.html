<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finanças Chat AI</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
            --primary: #00e676; --secondary: #ff5252; --accent: #2979ff; 
            --warning: #ffb74d;
        }

        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: flex-start;
            background: var(--card); border-bottom: 1px solid #333;
        }

        .header-stats { display: flex; gap: 25px; }
        .stat-group { display: flex; flex-direction: column; }
        .label-small { font-size: 0.65rem; color: #888; text-transform: uppercase; font-weight: bold; }
        .val-header { font-size: 1.2rem; font-weight: bold; }
        .val-saldo { color: var(--primary); }
        .val-fatura { color: var(--warning); }

        .month-nav { display: flex; align-items: center; gap: 10px; background: #252525; padding: 5px 12px; border-radius: 8px; border: 1px solid #444; }
        .btn-month { background: none; border: none; color: white; cursor: pointer; font-weight: bold; padding: 5px; }

        .view { display: none; flex-direction: column; height: 100%; overflow-y: auto; padding: 20px; padding-bottom: 160px; }
        .view.active { display: flex; }

        .card-mov {
            background: var(--card); border-radius: 12px; padding: 18px; position: relative;
            width: 100%; max-width: 450px; margin-bottom: 15px; border-left: 6px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: slideIn 0.3s ease;
        }
        .card-mov.receita { border-left-color: var(--primary); }
        .card-mov.despesa { border-left-color: var(--secondary); }
        .card-mov.parcelado { border-left-color: var(--warning); }

        .card-tipo { font-size: 0.7rem; font-weight: bold; text-transform: uppercase; color: #888; margin-bottom: 4px; }
        .card-nome { font-size: 1.2rem; font-weight: bold; color: #fff; display: block; }
        .card-cat { font-size: 0.8rem; color: var(--accent); margin-bottom: 10px; display: block; }
        .card-valor { font-size: 1.5rem; font-weight: bold; margin-bottom: 5px; }
        .card-data { font-size: 0.75rem; color: #888; margin-bottom: 10px; font-weight: 500; }
        .card-parcela-info { background: rgba(255, 183, 77, 0.1); color: var(--warning); padding: 8px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; }

        #input-wrapper { position: fixed; bottom: 80px; width: 100%; padding: 0 20px; box-sizing: border-box; }
        .input-area { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; background: #252525; padding: 10px 18px; border-radius: 30px; border: 1px solid #333; }
        input { flex: 1; padding: 5px; border: none; background: transparent; color: white; outline: none; font-size: 1rem; }

        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { background: none; border: none; color: #888; cursor: pointer; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--primary); }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>

<header>
    <div class="header-stats">
        <div class="stat-group">
            <span class="label-small">Saldo Disponível</span>
            <span id="header-total" class="val-header val-saldo">R$ 5.200,00</span>
        </div>
        <div class="stat-group">
            <span class="label-small">Fatura <span id="label-mes-fatura">MAIO</span></span>
            <span id="header-fatura" class="val-header val-fatura">R$ 0,00</span>
        </div>
    </div>
    <div class="month-nav">
        <button class="btn-month" onclick="changeMonth(-1)">❮</button>
        <span id="display-month" style="font-size:0.75rem; font-weight:bold;">MAIO 2026</span>
        <button class="btn-month" onclick="changeMonth(1)">❯</button>
    </div>
</header>

<div id="view-chat" class="view active">
    <div id="chat-messages"></div>
    <div id="input-wrapper">
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Ex: internet 100" onkeypress="if(event.key==='Enter') processInput()">
            <button onclick="processInput()" style="background:var(--primary); border:none; border-radius:50%; width:35px; height:35px; cursor:pointer;">➔</button>
        </div>
    </div>
</div>

<div id="view-saldo" class="view"><h3>Detalhes das Contas</h3></div>
<div id="view-resumo" class="view"><h3>Resumo Mensal</h3></div>
<div id="view-graficos" class="view"><h3>Gráficos</h3></div>

<nav>
    <button class="nav-item active" onclick="showView('chat', this)"><i>💬</i>Chat</button>
    <button class="nav-item" onclick="showView('saldo', this)"><i>💳</i>Saldos</button>
    <button class="nav-item" onclick="showView('resumo', this)"><i>📈</i>Resumo</button>
    <button class="nav-item" onclick="showView('graficos', this)"><i>📊</i>Gráficos</button>
</nav>

<script>
    let transacoes = [];
    let saldoBase = 5200;
    let meses = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    let mesAtualIndex = 4; // Maio

    function format(v) { return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }

    function capitalizeFirstLetter(string) {
        return string.charAt(0).toUpperCase() + string.slice(1);
    }

    function changeMonth(delta) {
        mesAtualIndex = (mesAtualIndex + delta + 12) % 12;
        updateUI();
    }

    function updateUI() {
        const nomeMes = meses[mesAtualIndex];
        document.getElementById('display-month').innerText = `${nomeMes} 2026`;
        document.getElementById('label-mes-fatura').innerText = nomeMes;

        let totalFaturaMes = 0;
        transacoes.forEach(t => {
            if (t.parcelas > 1 && t.confirmada) {
                let mesFinal = t.mesInicio + t.parcelas - 1;
                if (mesAtualIndex >= t.mesInicio && mesAtualIndex <= mesFinal) {
                    totalFaturaMes += (t.valor / t.parcelas);
                }
            }
        });

        document.getElementById('header-total').innerText = format(saldoBase);
        document.getElementById('header-fatura').innerText = format(totalFaturaMes);
        renderizarCards();
    }

    function processInput() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text) return;

        const valorMatch = text.match(/(\d+[\d,.]*)/);
        let valorTotal = valorMatch ? parseFloat(valorMatch[0].replace(',', '.')) : 0;
        const parcelasMatch = text.toLowerCase().match(/(\d+)\s*(x|vezes)/);
        const numParcelas = parcelasMatch ? parseInt(parcelasMatch[1]) : 1;
        
        let tipo = text.toLowerCase().includes('recebi') ? 'receita' : 'despesa';
        
        // Extração do nome com Capitalização Automática
        let nomeRaw = text.replace(valorMatch ? valorMatch[0] : '', '')
                          .replace(/\d+\s*(x|vezes)/gi, '')
                          .replace(/(paguei|recebi|gastei|no|na)/gi, '').trim();
        
        let nomeFinal = nomeRaw ? capitalizeFirstLetter(nomeRaw) : "Lançamento";

        const novaTransacao = {
            id: Date.now(),
            nome: nomeFinal,
            valor: valorTotal,
            tipo: tipo,
            parcelas: numParcelas,
            mesInicio: mesAtualIndex,
            dataRegistro: new Date().toLocaleDateString('pt-BR'), // Data importante para relatórios
            confirmada: false,
            categoria: text.toLowerCase().includes("tv") ? "ELETRÔNICOS" : "GERAL"
        };

        transacoes.push(novaTransacao);
        updateUI();
        input.value = '';
    }

    function renderizarCards() {
        const container = document.getElementById('chat-messages');
        container.innerHTML = '';
        
        transacoes.forEach(t => {
            const card = document.createElement('div');
            card.className = `card-mov ${t.parcelas > 1 ? 'parcelado' : t.tipo}`;
            const valorParcela = t.valor / t.parcelas;

            card.innerHTML = `
                <div class="card-tipo">${t.tipo === 'receita' ? '💰 Receita' : '🛒 Despesa'}</div>
                <span class="card-nome">${t.nome}</span>
                <span class="card-cat">📂 ${t.categoria}</span>
                <div class="card-valor">R$ ${t.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                <div class="card-data">📅 Registro: ${t.dataRegistro}</div>
                
                ${t.parcelas > 1 ? `
                    <div class="card-parcela-info">
                        💳 Parcela: R$ ${valorParcela.toLocaleString('pt-BR', {minimumFractionDigits: 2})} (${t.parcelas}x)
                    </div>
                ` : ''}

                <div style="margin-top:15px;">
                    ${!t.confirmada ? 
                        `<button onclick="confirmar(${t.id})" style="background:var(--primary); border:none; padding:10px; border-radius:8px; cursor:pointer; font-weight:bold; width:100%;">Confirmar</button>` : 
                        `<span style="color:var(--primary); font-size:0.85rem; font-weight:bold;">✅ Confirmado e Salvo</span>`
                    }
                </div>
            `;
            container.appendChild(card);
        });
        container.scrollTop = container.scrollHeight;
    }

    function confirmar(id) {
        let t = transacoes.find(x => x.id === id);
        if(!t || t.confirmada) return;
        t.confirmada = true;

        if(t.tipo === 'receita') {
            saldoBase += t.valor;
        } else if (t.parcelas === 1) {
            saldoBase -= t.valor;
        }
        updateUI();
    }

    function showView(viewId, btn) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('view-' + viewId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('input-wrapper').style.display = (viewId === 'chat') ? 'block' : 'none';
    }

    updateUI();
</script>
</body>
</html>
