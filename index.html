<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinChat</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{background:#f1f5f9;font-family:system-ui}
.msg-user{background:#0f172a;color:white;padding:10px;border-radius:12px;margin-left:auto;max-width:80%}
.msg-bot{background:white;border:1px solid #e2e8f0;padding:10px;border-radius:12px;max-width:80%}
.card{background:white;border-radius:14px;padding:14px;box-shadow:0 3px 10px rgba(0,0,0,.05)}
</style>

</head>

<body class="flex flex-col h-screen">

<header class="bg-white p-4 shadow flex justify-between">
<div>
<div class="text-xs text-slate-400 font-bold uppercase">Saldo</div>
<div id="saldo" class="text-2xl font-bold text-indigo-600">R$ 0,00</div>
</div>
</header>

<main class="flex-1 overflow-y-auto p-4">

<section id="chat">
<div id="feed" class="space-y-3 mb-24"></div>
</section>

<section id="transactions" class="hidden">

<div class="flex justify-between items-center mb-4">

<button onclick="changeMonth(-1)" class="bg-white px-3 py-1 rounded shadow">◀</button>
<div id="monthLabel" class="font-bold"></div>
<button onclick="changeMonth(1)" class="bg-white px-3 py-1 rounded shadow">▶</button>

</div>

<div id="transList" class="space-y-2"></div>

</section>

<section id="wallet" class="hidden">
<div id="walletList" class="space-y-2"></div>
</section>

<section id="reports" class="hidden">

<div class="card mb-4">
<canvas id="chart"></canvas>
</div>

<div id="legend" class="space-y-2"></div>

</section>

</main>

<div class="bg-white border-t p-3 flex gap-2">
<input id="input" class="flex-1 bg-slate-100 p-3 rounded-xl" placeholder="Digite ex: mercado 50 nubank">
<button onclick="send()" class="bg-indigo-600 text-white px-4 rounded-xl">OK</button>
</div>

<nav class="flex justify-around bg-white border-t p-2">
<button onclick="tab('chat')">Chat</button>
<button onclick="tab('transactions')">Lista</button>
<button onclick="tab('wallet')">Contas</button>
<button onclick="tab('reports')">Gráficos</button>
</nav>

<script>

let data={
saldo:0,
defaultConta:"Nubank",
contas:{
"Nubank":{saldo:0,icon:"🟪"},
"Itaú":{saldo:0,icon:"🟧"},
"Carteira":{saldo:0,icon:"💵"}
},
transacoes:[],
categorias:{}
}

let currentMonth=new Date()

const saved=localStorage.getItem("finchat")

if(saved){
data=JSON.parse(saved)
data.transacoes.forEach(t=>t.data=new Date(t.data))
}

function save(){
localStorage.setItem("finchat",JSON.stringify(data))
}

function updateSaldo(){
document.getElementById("saldo").innerText="R$ "+data.saldo.toLocaleString("pt-BR",{minimumFractionDigits:2})
}

function tab(id){

document.querySelectorAll("main section").forEach(s=>s.classList.add("hidden"))
document.getElementById(id).classList.remove("hidden")

if(id==="transactions")renderTransactions()
if(id==="wallet")renderWallet()
if(id==="reports")renderReports()

}

function parse(txt){

const t=txt.toLowerCase()

let valor=0
const m=t.match(/\d+([.,]\d+)?/)
if(m)valor=parseFloat(m[0].replace(",","."))

let tipo=t.includes("recebi")||t.includes("ganhei")?"RECEITA":"DESPESA"

let conta=data.defaultConta

if(t.includes("nu"))conta="Nubank"
if(t.includes("itau"))conta="Itaú"
if(t.includes("dinheiro"))conta="Carteira"

let cat="Outros"

if(t.includes("uber"))cat="Transporte"
if(t.includes("mercado")||t.includes("padaria"))cat="Mercado"
if(t.includes("ifood")||t.includes("almoço")||t.includes("comida"))cat="Alimentação"
if(t.includes("gasolina"))cat="Combustível"

return{valor,tipo,conta,cat}

}

function send(){

const txt=document.getElementById("input").value.trim()
if(!txt)return

msg(txt,true)

const r=parse(txt)

confirmCard(r,txt)

document.getElementById("input").value=""

}

function msg(txt,user){

const d=document.createElement("div")
d.className=user?"msg-user":"msg-bot"
d.innerText=txt
document.getElementById("feed").appendChild(d)

}

function confirmCard(r,txt){

const id=Date.now()

const card=document.createElement("div")
card.className="card flex justify-between items-center"

card.innerHTML=`
<div>
<div class="text-xs text-slate-400">${r.conta}</div>
<div class="font-bold">${r.cat}</div>
</div>

<input id="v${id}" type="number" value="${r.valor}" class="w-20 text-right font-bold">

<button onclick="confirm(${id},'${r.tipo}','${r.conta}','${txt}','${r.cat}')" class="bg-indigo-600 text-white px-3 py-1 rounded">
✓
</button>
`

document.getElementById("feed").appendChild(card)

}

function confirm(id,tipo,conta,txt,cat){

const v=parseFloat(document.getElementById("v"+id).value)

if(tipo==="RECEITA"){
data.saldo+=v
data.contas[conta].saldo+=v
}else{
data.saldo-=v
data.contas[conta].saldo-=v
data.categorias[cat]=(data.categorias[cat]||0)+v
}

data.transacoes.push({valor:v,tipo,conta,cat,data:new Date(),txt})

save()

updateSaldo()

renderTransactions()
renderWallet()
renderReports()

}

function changeMonth(n){

currentMonth.setMonth(currentMonth.getMonth()+n)

renderTransactions()

}

function renderTransactions(){

const list=document.getElementById("transList")
list.innerHTML=""

document.getElementById("monthLabel").innerText=currentMonth.toLocaleDateString("pt-BR",{month:"long",year:"numeric"})

data.transacoes
.filter(t=>t.data.getMonth()==currentMonth.getMonth() && t.data.getFullYear()==currentMonth.getFullYear())
.reverse()
.forEach((t,i)=>{

const d=document.createElement("div")
d.className="card flex justify-between"

d.innerHTML=`
<div>
<b>${t.cat}</b><br>
<span class="text-xs text-slate-400">${t.conta}</span>
</div>

<div class="${t.tipo==="RECEITA"?"text-green-600":"text-red-500"} font-bold">
${t.tipo==="RECEITA"?"+":"-"} R$ ${t.valor}
</div>
`

list.appendChild(d)

})

}

function renderWallet(){

const list=document.getElementById("walletList")
list.innerHTML=""

Object.keys(data.contas).forEach(n=>{

const c=data.contas[n]

const d=document.createElement("div")
d.className="card flex justify-between"

d.innerHTML=`
<span>${c.icon} ${n}</span>
<span>R$ ${c.saldo.toFixed(2)}</span>
`

list.appendChild(d)

})

}

let chart

function renderReports(){

const labels=Object.keys(data.categorias)
const vals=Object.values(data.categorias)

if(chart)chart.destroy()

chart=new Chart(document.getElementById("chart"),{
type:"doughnut",
data:{
labels:labels,
datasets:[{
data:vals,
backgroundColor:["#6366f1","#ef4444","#10b981","#f59e0b","#3b82f6"]
}]
}
})

const legend=document.getElementById("legend")
legend.innerHTML=""

labels.forEach((l,i)=>{

const d=document.createElement("div")
d.className="card flex justify-between"

d.innerHTML=`<span>${l}</span><b>R$ ${vals[i]}</b>`

legend.appendChild(d)

})

}

updateSaldo()

</script>

</body>
</html>
