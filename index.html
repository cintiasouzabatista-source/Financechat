<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanĂ§as Chat AI</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0;
            --primary: #00e676; --secondary: #ff5252; --accent: #2979ff; 
            --warning: #ffb74d; --recurring: #ba68c8;
        }

        body {
            font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        header {
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            background: var(--card); border-bottom: 1px solid #333;
        }

        #chat-container {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column;
            gap: 15px; padding-bottom: 120px;
        }

        .card-mov {
            background: var(--card); border-radius: 12px; padding: 15px; position: relative;
            width: 95%; max-width: 450px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 6px solid var(--accent); animation: slideIn 0.3s ease-out;
        }

        .card-mov.receita { border-left-color: var(--primary); }
        .card-mov.despesa { border-left-color: var(--secondary); }
        .card-mov.parcelado { border-left-color: var(--warning); }
        .card-mov.recorrente { border-left-color: var(--recurring); }

        .timer-bar {
            position: absolute; top: 0; left: 0; height: 3px;
            background: var(--accent); width: 100%; border-radius: 12px 12px 0 0;
        }

        .card-header { display: flex; justify-content: space-between; font-size: 0.75rem; color: #888; text-transform: uppercase; }
        .despesa-nome { font-size: 1.1rem; font-weight: bold; color: #fff; margin: 5px 0; display: block; }
        .val-destaque { font-size: 1.4rem; font-weight: bold; margin-bottom: 5px; }

        .actions { margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap; }
        .btn-action {
            flex: 1; padding: 8px; border: none; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 0.8rem; min-width: 80px;
        }
        .btn-edit { background: #333; color: white; }
        .btn-del { background: rgba(255, 82, 82, 0.1); color: var(--secondary); border: 1px solid rgba(255, 82, 82, 0.2); }
        .btn-fix { background: rgba(186, 104, 200, 0.2); color: var(--recurring); border: 1px solid var(--recurring); }

        .input-wrapper { position: fixed; bottom: 0; width: 100%; padding: 20px; background: linear-gradient(transparent, var(--bg) 40%); box-sizing: border-box; }
        .input-area { max-width: 600px; margin: 0 auto; display: flex; gap: 10px; background: #252525; padding: 8px 15px; border-radius: 30px; border: 1px solid #333; }
        input { flex: 1; padding: 10px; border: none; background: transparent; color: white; outline: none; }
        .btn-send { background: var(--primary); border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">âť® MARĂ‡O 2026 âťŻ</div>
    <div style="color: var(--primary); font-weight: bold;">R$ 5.200,00</div>
</header>

<div id="chat-container"></div>

<div class="input-wrapper">
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ex: Energia ElĂ©trica 250 Nubank" onkeypress="if(event.key==='Enter') processInput()">
        <button class="btn-send" onclick="processInput()">âž”</button>
    </div>
</div>

<script>
    function processInput() {
        const input = document.getElementById('user-input');
        if(!input.value.trim()) return;
        createCard(input.value.trim());
        input.value = '';
    }

    function createCard(text) {
        const container = document.getElementById('chat-container');
        const cardId = 'card-' + Date.now();
        const textoLimpo = text.toLowerCase();
        
        const valorMatch = text.match(/(\d+[\d,.]*)/);
        let valorTotal = valorMatch ? parseFloat(valorMatch[0].replace(',', '.')) : 0;
        
        let nomeDespesa = text.replace(valorMatch ? valorMatch[0] : '', '')
            .replace(/(paguei|gastei|no|na|nubank|inter|itau|carteira)/gi, '').trim();

        let categoria = "Geral";
        if(textoLimpo.match(/(energia|luz|Ăˇgua|internet|aluguel)/)) categoria = "Contas Fixas";
        if(textoLimpo.includes("residencia")) categoria += " / ResidĂŞncia";

        const ehRecorrente = textoLimpo.match(/(todo mĂŞs|mensal|recorrente)/);
        const parcelasMatch = textoLimpo.match(/(\d+)\s*(x|vezes)/);
        const numParcelas = parcelasMatch ? parseInt(parcelasMatch[1]) : 1;

        const card = document.createElement('div');
        card.className = `card-mov ${ehRecorrente ? 'recorrente' : (numParcelas > 1 ? 'parcelado' : 'despesa')}`;
        card.id = cardId;
        
        card.innerHTML = `
            <div class="timer-bar" id="bar-${cardId}"></div>
            <div class="card-header"><span>đź“‚ ${categoria}</span></div>
            <span class="despesa-nome">${nomeDespesa || "Nova Despesa"}</span>
            <div class="val-destaque">R$ ${valorTotal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
            <div id="status-${cardId}" style="font-size: 0.85rem;">
                ${ehRecorrente ? '<span style="color: var(--recurring)">đź”„ Recorrente Mensal</span>' : 
                (numParcelas > 1 ? `<span>đź”ą ${numParcelas}x de R$ ${(valorTotal/numParcelas).toFixed(2)}</span>` : '<span>đź”ą Ă€ vista</span>')}
            </div>
            <div class="actions" id="actions-${cardId}">
                ${!ehRecorrente ? `<button class="btn-action btn-fix" onclick="setRecorrente('${cardId}')">Tornar Fixo? đź”„</button>` : ''}
                <button class="btn-action btn-edit" onclick="document.getElementById('${cardId}').remove()">âśŹď¸Ź</button>
                <button class="btn-action btn-del" onclick="document.getElementById('${cardId}').remove()">đź—‘ď¸Ź</button>
            </div>
        `;
        
        container.appendChild(card);
        container.scrollTop = container.scrollHeight;

        let timeLeft = 100;
        const interval = setInterval(() => {
            timeLeft -= 1.25;
            document.getElementById(`bar-${cardId}`).style.width = timeLeft + '%';
            if (timeLeft <= 0) {
                clearInterval(interval);
                finalize(cardId);
            }
        }, 100);
        card.dataset.interval = interval;
    }

    function setRecorrente(id) {
        const card = document.getElementById(id);
        clearInterval(card.dataset.interval);
        card.className = "card-mov recorrente";
        document.getElementById(`bar-${id}`).style.display = 'none';
        document.getElementById(`status-${id}`).innerHTML = '<span style="color: var(--recurring)">đź”„ Salvo como Conta Fixa</span>';
        document.getElementById(`actions-${id}`).innerHTML = "<small>âś… Registro atualizado para mensal</small>";
    }

    function finalize(id) {
        const bar = document.getElementById(`bar-${id}`);
        if(bar) bar.style.display = 'none';
        const actions = document.getElementById(`actions-${id}`);
        if(actions) actions.innerHTML = "<span style='color: var(--primary); font-size: 0.8rem;'>âś… Confirmado</span>";
    }
</script>
</body>
</html>
