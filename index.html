<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Chat</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
:root{
--bg:#0b1220;
--panel:#111827;
--text:#ffffff;
--muted:#9ca3af;
--primary:#2563eb;
}
:root.light{
--bg:#f3f4f6;
--panel:#ffffff;
--text:#111827;
--muted:#6b7280;
--primary:#2563eb;
}
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:var(--bg);
color:var(--text);
}
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:var(--panel);
}
.container{
padding:16px;
}
.view{display:none}
.view.active{display:block}
.chatbox{
background:var(--panel);
padding:16px;
border-radius:10px;
}
input{
padding:10px;
border-radius:8px;
border:1px solid #ccc;
width:70%;
}
button{
padding:10px 14px;
border-radius:8px;
border:0;
background:var(--primary);
color:#fff;
cursor:pointer;
}
.monthbar{
display:flex;
gap:10px;
align-items:center;
margin-bottom:16px;
}
.bottomnav{
position:fixed;
bottom:0;
left:0;
right:0;
display:flex;
justify-content:space-around;
background:var(--panel);
padding:10px;
}
.bottomnav button{
background:none;
color:var(--text);
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
<strong>Finance Chat</strong>
<button onclick="toggleTheme()">Tema</button>
</div>

<div class="container">

<div id="chat" class="view active">
<h2>Chat IA</h2>
<div class="chatbox">
<p>O que vamos registrar?</p>
<input id="msg" placeholder="mercado 120 nubank">
<button onclick="add()">Enviar</button>
<ul id="chatlist"></ul>
</div>
</div>

<div id="transacoes" class="view">
<div class="monthbar">
<button onclick="prev()">◀</button>
<span id="month"></span>
<button onclick="next()">▶</button>
</div>
<h2>Transações</h2>
<ul id="trans"></ul>
</div>

<div id="saldo" class="view">
<div class="monthbar">
<button onclick="prev()">◀</button>
<span id="month2"></span>
<button onclick="next()">▶</button>
</div>
<h2>Saldo</h2>
<p id="saldoValor">R$0</p>
</div>

<div id="graficos" class="view">
<div class="monthbar">
<button onclick="prev()">◀</button>
<span id="month3"></span>
<button onclick="next()">▶</button>
</div>
<h2>Gráficos</h2>
<p>Em breve</p>
</div>

</div>

<div class="bottomnav">
<button onclick="openView('chat')">Chat</button>
<button onclick="openView('transacoes')">Trans</button>
<button onclick="openView('saldo')">Saldo</button>
<button onclick="openView('graficos')">Gráficos</button>
</div>

<script>
let data=[]
let month=new Date().getMonth()

function openView(v){
document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"))
document.getElementById(v).classList.add("active")
}

function add(){
let t=document.getElementById("msg").value
if(!t) return
data.push(t)

let li=document.createElement("li")
li.textContent=t
document.getElementById("chatlist").appendChild(li)
document.getElementById("trans").appendChild(li.cloneNode(true))

document.getElementById("msg").value=""
}

function prev(){month--;updateMonth()}
function next(){month++;updateMonth()}

function updateMonth(){
let m=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"]
let txt=m[(month+12)%12]+" 2026"
document.getElementById("month").innerText=txt
document.getElementById("month2").innerText=txt
document.getElementById("month3").innerText=txt
}
updateMonth()

function toggleTheme(){
document.documentElement.classList.toggle("light")
}
</script>

</body>
</html>
