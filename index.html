<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance App</title>

<link rel="manifest" href="/manifest.json">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="apple-touch-icon" href="/icon-512.png">
<meta name="theme-color" content="#ffffff">

<style>
:root{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#6b7280;
  --line:#e5e7eb;
  --btn:#0f172a;
  --btnText:#ffffff;
}

body.dark{
  --bg:#0b0f14;
  --card:#0f172a;
  --text:#f8fafc;
  --muted:#94a3b8;
  --line:#1f2937;
  --btn:#ffffff;
  --btnText:#000000;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-bottom:1px solid var(--line);
}

h1{
  margin:0;
  font-size:22px;
  letter-spacing:-0.5px;
}

button{
  border:none;
  padding:10px 16px;
  border-radius:12px;
  font-weight:600;
  cursor:pointer;
  background:var(--btn);
  color:var(--btnText);
}

.container{
  max-width:600px;
  margin:auto;
  padding:20px;
}

.card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:20px;
  padding:20px;
  min-height:200px;
  box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

input{
  width:100%;
  margin-top:20px;
  padding:14px;
  border-radius:14px;
  border:1px solid var(--line);
  font-size:16px;
  background:var(--card);
  color:var(--text);
}

input:focus{
  outline:none;
  border-color:#6366f1;
}

.actions{
  margin-top:15px;
}

.entry{
  margin-top:10px;
  font-weight:500;
}
</style>
</head>

<body>

<header>
  <h1>Finance App</h1>
  <button onclick="toggleTheme()" id="themeBtn">🌙</button>
</header>

<div class="container">
  <div class="card" id="chatBox">
    <strong>O que vamos registrar hoje?</strong>
  </div>

  <input type="text" id="entrada" placeholder="Digite aqui...">

  <div class="actions">
    <button onclick="registrar()">Registrar</button>
  </div>
</div>

<script>
const THEME_KEY="finance_theme";

function applyTheme(){
  const saved = localStorage.getItem(THEME_KEY) || "light";
  document.body.classList.toggle("dark", saved === "dark");
  document.getElementById("themeBtn").textContent = saved === "dark" ? "☀️" : "🌙";
}

function toggleTheme(){
  const current = localStorage.getItem(THEME_KEY) || "light";
  const next = current === "dark" ? "light" : "dark";
  localStorage.setItem(THEME_KEY, next);
  applyTheme();
}

function registrar(){
  const input = document.getElementById("entrada");
  const box = document.getElementById("chatBox");
  if(input.value.trim() === "") return;

  const p = document.createElement("div");
  p.className="entry";
  p.textContent = input.value.charAt(0).toUpperCase() + input.value.slice(1);
  box.appendChild(p);

  input.value="";
}

applyTheme();
</script>

</body>
</html>
