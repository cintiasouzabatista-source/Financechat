<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Finance</title>
<meta name="theme-color" content="#f4f6f8">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  :root{
    --bg:#f4f6f8; --card:#fff; --text:#0f172a; --muted:#6b7280; --line:#e5e7eb;
    --okbg:#d9f2e6; --okbtn:#cfe8da;
    --shadow:0 10px 26px rgba(15,23,42,.08);
    --r:18px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:var(--bg);color:var(--text);}
  header{position:sticky;top:0;background:rgba(244,246,248,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);
    padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
  header .t{font-weight:650}
  header .s{font-size:12px;color:var(--muted)}
  .wrap{max-width:520px;margin:0 auto;padding:16px 14px 26px;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:22px;box-shadow:var(--shadow);padding:14px;}
  .muted{color:var(--muted);font-size:12px;line-height:1.35}
  label{display:block;margin:10px 0 6px;font-size:12px;color:var(--muted)}
  input{width:100%;padding:12px;border-radius:14px;border:1px solid #ccc;outline:none;font-size:14px;background:#fff;}
  input:focus{border-color:#b7c2ff;box-shadow:0 0 0 4px rgba(99,102,241,.12)}
  button{padding:12px 18px;border-radius:14px;border:1px solid var(--line);background:var(--okbtn);font-weight:600;cursor:pointer;}
  button:active{transform:translateY(1px)}
  .btn-secondary{background:#fff}
  .btn-danger{background:#fff1f2;border-color:#fecdd3;color:#9f1239}
  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row > *{flex:1}
  .hidden{display:none!important}
  .chat{display:flex;flex-direction:column;height:72vh;min-height:460px;gap:12px}
  .messages{flex:1;overflow:auto;display:flex;flex-direction:column;gap:10px;padding:2px 2px 8px;}
  .msg{padding:12px 14px;border-radius:18px;max-width:86%;border:1px solid var(--line);background:#fff;line-height:1.35}
  .bot{background:#fff}
  .user{background:var(--okbg);align-self:flex-end;border-color:#c8ead5}
  .input-area{display:flex;gap:10px}
  .input-area input{flex:1}
  .pill{display:inline-flex;align-items:center;gap:8px;padding:8px 10px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);font-size:12px}
  #toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);background:rgba(15,23,42,.92);color:#fff;
    padding:10px 12px;border-radius:14px;font-size:12px;display:none;z-index:999;max-width:92vw;text-align:center}
</style>
</head>
<body>
<header>
  <div>
    <div class="t" id="hdrTitle">Finance</div>
    <div class="s" id="hdrSub">login • chat</div>
  </div>
  <div class="row" style="flex:0;gap:8px">
    <span class="pill" id="pillUser">🔒</span>
    <button class="btn-secondary hidden" id="btnLogout" type="button">Sair</button>
  </div>
</header>

<div class="wrap">
  <!-- LOGIN -->
  <section id="loginView" class="card">
    <div style="font-weight:650;font-size:16px">Entrar</div>
    <div class="muted" style="margin-top:6px">Seu acesso é local (por enquanto). Depois migramos para nuvem.</div>

    <label>Email</label>
    <input id="email" inputmode="email" placeholder="seuemail@exemplo.com" autocomplete="email">

    <label>Senha</label>
    <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password">

    <div class="row" style="margin-top:12px">
      <button id="btnLogin" type="button">Entrar</button>
      <button class="btn-secondary" id="btnCreate" type="button">Criar conta</button>
    </div>
    <div class="muted" style="margin-top:10px">Dica: se esquecer, é só limpar os dados do site/app.</div>
  </section>

  <!-- CHAT -->
  <section id="chatView" class="card hidden">
    <div class="chat">
      <div class="messages" id="messages"></div>

      <div class="input-area">
        <input id="input" placeholder="Informe seus movimentos..." autocomplete="off">
        <button id="btnSend" type="button">Enviar</button>
      </div>
      <div class="muted">Ex: “Gastei 100 mercado pix Nubank” • “Gastei 200 roupa cartão Nubank 2x”</div>
    </div>
  </section>
</div>

<div id="toast"></div>

<script>
/* ---------------- PWA ---------------- */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}

/* ---------------- Helpers ---------------- */
const $ = (id)=>document.getElementById(id);
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.style.display="block";
  clearTimeout(toast._tm); toast._tm=setTimeout(()=>t.style.display="none",2200);
}
function norm(s){ return String(s||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim(); }
function addMessage(text, who){
  const div=document.createElement("div");
  div.className="msg " + (who==="user"?"user":"bot");
  div.innerHTML=String(text||"").replace(/\n/g,"<br>");
  $("messages").appendChild(div);
  $("messages").scrollTop = $("messages").scrollHeight;
}
function greeting(){
  const h=new Date().getHours();
  const g=h<12?"Bom dia":(h<18?"Boa tarde":"Boa noite");
  addMessage(`${g} 😊<br>Seja bem-vindo(a) ao Finance.<br><br><b>Informe seus movimentos.</b>`, "bot");
}

/* ---------------- Local Login (v1) ----------------
   - NÃO é segurança "banco" ainda. Serve para separar perfis no mesmo aparelho.
   - Depois migramos para backend + DB.
--------------------------------------------------- */
const KEY_USERS="fp_users_v1";      // { emailNorm: {salt, hash} }
const KEY_ACTIVE="fp_active_v1";    // emailNorm
function loadUsers(){ try{return JSON.parse(localStorage.getItem(KEY_USERS)||"{}");}catch(_){return {};} }
function saveUsers(u){ localStorage.setItem(KEY_USERS, JSON.stringify(u)); }

async function sha256(txt){
  const enc=new TextEncoder().encode(txt);
  const buf=await crypto.subtle.digest("SHA-256", enc);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}
function randSalt(){
  const a=new Uint8Array(16); crypto.getRandomValues(a);
  return [...a].map(b=>b.toString(16).padStart(2,"0")).join("");
}
async function makeHash(pass, salt){ return await sha256(`${salt}::${pass}`); }

async function createAccount(email, pass){
  const e=norm(email);
  if(!e || !e.includes("@")) throw new Error("Email inválido");
  if(!pass || pass.length<4) throw new Error("Senha curta (mín 4)");
  const users=loadUsers();
  if(users[e]) throw new Error("Conta já existe");
  const salt=randSalt();
  const hash=await makeHash(pass, salt);
  users[e]={salt, hash};
  saveUsers(users);
  return e;
}
async function login(email, pass){
  const e=norm(email);
  const users=loadUsers();
  if(!users[e]) throw new Error("Conta não encontrada");
  const hash=await makeHash(pass, users[e].salt);
  if(hash !== users[e].hash) throw new Error("Senha incorreta");
  localStorage.setItem(KEY_ACTIVE, e);
  return e;
}
function logout(){
  localStorage.removeItem(KEY_ACTIVE);
  showLogin();
}
function activeUser(){
  return localStorage.getItem(KEY_ACTIVE);
}

/* ---------------- Views ---------------- */
function showLogin(){
  $("loginView").classList.remove("hidden");
  $("chatView").classList.add("hidden");
  $("btnLogout").classList.add("hidden");
  $("pillUser").textContent="🔒";
  $("hdrSub").textContent="login • chat";
}
function showChat(email){
  $("loginView").classList.add("hidden");
  $("chatView").classList.remove("hidden");
  $("btnLogout").classList.remove("hidden");
  $("pillUser").textContent = "👤 " + (email||"");
  $("hdrSub").textContent="chat • modo C (em evolução)";
  if ($("messages").children.length===0) greeting();
}

/* ---------------- Chat minimal (motor vai vir no próximo passo) ---------------- */
function send(){
  const text=($("input").value||"").trim();
  if(!text) return;
  addMessage(text,"user");
  $("input").value="";
  addMessage("✅ Movimento registrado! (próximo passo: cartão/parcelas/faturas)", "bot");
}

/* ---------------- Events ---------------- */
$("btnSend").addEventListener("click", send);
$("input").addEventListener("keydown", (e)=>{ if(e.key==="Enter"){ e.preventDefault(); send(); }});
$("btnLogout").addEventListener("click", ()=>{ logout(); toast("Saiu"); });

$("btnCreate").addEventListener("click", async ()=>{
  try{
    const e=$("email").value, p=$("pass").value;
    const user=await createAccount(e,p);
    localStorage.setItem(KEY_ACTIVE, user);
    $("messages").innerHTML="";
    showChat(user);
    toast("Conta criada ✅");
  }catch(err){ toast(String(err.message||err)); }
});
$("btnLogin").addEventListener("click", async ()=>{
  try{
    const e=$("email").value, p=$("pass").value;
    const user=await login(e,p);
    $("messages").innerHTML="";
    showChat(user);
    toast("Entrou ✅");
  }catch(err){ toast(String(err.message||err)); }
});

/* boot */
const au=activeUser();
if(au) showChat(au); else showLogin();
</script>
</body>
</html>
