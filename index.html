
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Finance Chat</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.sidebar{position:fixed;left:0;top:0;bottom:0;width:220px;background:#0f172a;padding:20px}
.sidebar button{display:block;width:100%;margin-bottom:10px;padding:10px;background:#1e293b;border:0;color:#fff;border-radius:8px}
.main{margin-left:240px;padding:20px}
.view{display:none}
.view.active{display:block}
.monthbar{display:flex;gap:10px;align-items:center;margin-bottom:20px}
.chatbox{background:#111827;padding:20px;border-radius:10px}
input{width:80%;padding:10px;border-radius:8px;border:0}
button.send{padding:10px 14px;border:0;background:#2563eb;color:#fff;border-radius:8px}
.bottomnav{display:none}
@media(max-width:900px){
.sidebar{display:none}
.main{margin:0}
.bottomnav{display:flex;position:fixed;bottom:0;left:0;right:0;background:#0f172a;justify-content:space-around;padding:10px}
.bottomnav button{background:none;border:0;color:#fff}
}
</style>
</head>

<body>

<div class="sidebar">
<h3>Finance Chat</h3>
<button onclick="openView('chat')">Chat</button>
<button onclick="openView('transacoes')">Transações</button>
<button onclick="openView('saldo')">Saldo</button>
<button onclick="openView('graficos')">Gráficos</button>
</div>

<div class="main">

<div id="chat" class="view active">
<h2>Chat IA</h2>
<div class="chatbox">
<p>O que vamos registrar?</p>
<input id="msg" placeholder="ex: mercado 120 nubank">
<button class="send" onclick="add()">Enviar</button>
<ul id="list"></ul>
</div>

<h3>Ler Nota Fiscal</h3>
<textarea style="width:100%;height:80px"></textarea>
</div>

<div id="transacoes" class="view">
<div class="monthbar">
<button onclick="prev()">◀</button>
<span id="monthLabel"></span>
<button onclick="next()">▶</button>
</div>
<h2>Transações</h2>
<ul id="trans"></ul>
</div>

<div id="saldo" class="view">
<div class="monthbar">
<button onclick="prev()">◀</button>
<span id="monthLabel2"></span>
<button onclick="next()">▶</button>
</div>
<h2>Saldo</h2>
<p id="saldoValor">R$0</p>
</div>

<div id="graficos" class="view">
<div class="monthbar">
<button onclick="prev()">◀</button>
<span id="monthLabel3"></span>
<button onclick="next()">▶</button>
</div>
<h2>Gráficos</h2>
<p>Em breve</p>
</div>

</div>

<div class="bottomnav">
<button onclick="openView('chat')">Chat</button>
<button onclick="openView('transacoes')">Trans</button>
<button onclick="openView('saldo')">Saldo</button>
<button onclick="openView('graficos')">Gráf</button>
</div>

<script>
let data=[]
let month=new Date().getMonth()

function openView(v){
document.querySelectorAll(".view").forEach(x=>x.classList.remove("active"))
document.getElementById(v).classList.add("active")
}

function add(){
let t=document.getElementById("msg").value
if(!t)return
data.push(t)
let li=document.createElement("li")
li.textContent=t
document.getElementById("list").appendChild(li)
document.getElementById("trans").appendChild(li.cloneNode(true))
}

function prev(){month--;updateMonth()}
function next(){month++;updateMonth()}

function updateMonth(){
let m=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"]
let txt=m[(month+12)%12]+" 2026"
document.getElementById("monthLabel").innerText=txt
document.getElementById("monthLabel2").innerText=txt
document.getElementById("monthLabel3").innerText=txt
}
updateMonth()
</script>

</body>
</html>
