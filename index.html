<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR PROFISSIONAL */
        .sidebar { width: 260px; background: white; border-right: 1px solid #f0f0f0; padding: 2.5rem 1rem; flex-shrink: 0; }
        .logo { font-weight: 800; font-size: 1.4rem; text-transform: uppercase; padding-left: 1.5rem; margin-bottom: 3.5rem; }
        .nav-item { display: flex; align-items: center; gap: 12px; padding: 0.8rem 1.5rem; border-radius: 1rem; color: #888; font-weight: 600; font-size: 14px; margin-bottom: 0.5rem; cursor: pointer; transition: 0.2s; }
        .nav-item.active { background: #f4f4f4; color: #1d3b91; }
        
        /* MAIN AREA */
        .main { flex: 1; overflow-y: auto; padding: 3rem 5%; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 100%; max-width: 850px; }
        
        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4rem; width: 100%; }
        .title { font-weight: 700; color: #c0c0c0; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.85rem; }
        .balance-box { text-align: right; }
        .balance-label { font-size: 10px; font-weight: 700; color: #b0b0b0; text-transform: uppercase; }
        .balance-value { font-weight: 800; font-size: 1.8rem; color: #22c55e; }

        /* CHAT INPUT E BOTÕES */
        .btn-quick { background: #f4f4f4; border-radius: 2rem; padding: 0.5rem 1.2rem; font-size: 11px; font-weight: 700; text-transform: uppercase; display: flex; align-items: center; gap: 8px; border: 1px solid transparent; }
        .btn-quick:hover { background: white; border-color: #1d3b91; color: #1d3b91; }
        .input-chat { background: #f4f4f4; border-radius: 1.5rem; padding: 1.5rem 2rem; width: 100%; outline: none; font-size: 1.1rem; margin-top: 1rem; border: none; }

        /* CARDS DE HISTÓRICO */
        .card-mov { background: white; border-radius: 1.8rem; padding: 1.5rem 2rem; border: 1px solid #f8f8f8; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; box-shadow: 0 4px 15px rgba(0,0,0,0.01); }
        .card-mov .desc { font-weight: 700; text-transform: uppercase; font-size: 0.9rem; }
        .card-mov .date { font-size: 10px; color: #ccc; font-weight: 700; text-transform: uppercase; }
        .card-mov .val { font-weight: 700; color: #ef4444; font-size: 1rem; }

        /* REVISÃO 8S */
        .revision { background: white; border-radius: 2.5rem; padding: 2.5rem; border: 1px solid #eee; position: relative; overflow: hidden; margin-top: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.04); }
        .timer-bar { height: 5px; background: #1d3b91; position: absolute; bottom: 0; left: 0; width: 100%; transition: width 8s linear; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">Finance</div>
        <nav>
            <div class="nav-item active">💬 Chat</div>
            <div class="nav-item">📊 Saldos</div>
            <div class="nav-item">📅 Calendário</div>
            <div class="nav-item">⚙️ Ajustes</div>
        </nav>
    </aside>

    <main class="main">
        <div class="wrapper">
            <header class="header">
                <h2 class="title">Dashboard</h2>
                <div class="balance-box">
                    <p class="balance-label">Balanço do Mês</p>
                    <p id="saldo-topo" class="balance-value">R$ 0,00</p>
                </div>
            </header>

            <section id="chat-section">
                <div class="flex gap-3 mb-6">
                    <button onclick="comando('Uber 25')" class="btn-quick">🚗 Uber</button>
                    <button onclick="comando('iFood 65')" class="btn-quick">🍕 iFood</button>
                    <button onclick="comando('Mercado 200')" class="btn-quick">🛒 Mercado</button>
                </div>
                
                <div id="input-container">
                    <input type="text" id="chat-input" class="input-chat" placeholder="Ex: paguei 300 mercado">
                </div>

                <div id="card-revisao" class="hidden revision">
                    <div class="flex justify-between mb-8">
                        <span class="text-[10px] font-bold text-gray-300 uppercase tracking-widest">Revisar</span>
                        <span id="parc-label" class="text-[10px] font-bold text-gray-300 uppercase">1X DE R$ 0,00</span>
                    </div>
                    <div class="space-y-6">
                        <input id="rev-desc" type="text" class="input-chat font-bold uppercase text-2xl !mt-0" onfocus="stopTimer()">
                        <div class="flex gap-4">
                            <input id="rev-val" type="text" class="input-chat !mt-0 font-bold text-blue-900" oninput="recalc()">
                            <input id="rev-parc" type="text" class="input-chat !mt-0 w-24 text-center font-bold" value="1" oninput="recalc()">
                        </div>
                        <div class="flex justify-between items-center pt-6">
                            <button onclick="reset()" class="text-red-400 font-bold text-[10px] uppercase">Excluir</button>
                            <button onclick="confirmar()" class="bg-black text-white px-12 py-4 rounded-2xl text-[10px] font-bold uppercase">Confirmar</button>
                        </div>
                    </div>
                    <div id="timer-bar" class="timer-bar"></div>
                </div>
            </section>

            <section id="data-section" class="mt-12">
                <h3 class="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-6 ml-4">Movimentações Recentes</h3>
                <div id="lista"></div>
            </section>
        </div>
    </main>

    <script>
        let transacoes = JSON.parse(localStorage.getItem('fin_final')) || [];
        let timerAtivo = null;

        window.onload = render;

        document.getElementById('chat-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') comando(e.target.value);
        });

        function comando(t) {
            const v = (t.match(/\d+/) || [0])[0];
            const d = t.split(' ')[0].toUpperCase();
            document.getElementById('rev-desc').value = d;
            document.getElementById('rev-val').value = parseFloat(v).toFixed(2);
            document.getElementById('input-container').classList.add('hidden');
            document.getElementById('card-revisao').classList.remove('hidden');
            startTimer();
            recalc();
        }

        function startTimer() {
            const bar = document.getElementById('timer-bar');
            bar.style.display = 'block'; bar.style.width = '100%';
            setTimeout(() => { bar.style.transition = 'width 8s linear'; bar.style.width = '0%'; }, 50);
            timerAtivo = setTimeout(confirmar, 8000);
        }

        function stopTimer() { clearTimeout(timerAtivo); document.getElementById('timer-bar').style.display = 'none'; }

        function confirmar() {
            const n = { id: Date.now(), d: document.getElementById('rev-desc').value, v: parseFloat(document.getElementById('rev-val').value) };
            transacoes.push(n);
            localStorage.setItem('fin_final', JSON.stringify(transacoes));
            render(); reset();
        }

        function reset() {
            clearTimeout(timerAtivo);
            document.getElementById('card-revisao').classList.add('hidden');
            document.getElementById('input-container').classList.remove('hidden');
            document.getElementById('chat-input').value = '';
        }

        function render() {
            const l = document.getElementById('lista');
            let s = 0; l.innerHTML = '';
            transacoes.slice().reverse().forEach(t => {
                s += t.v;
                l.innerHTML += `<div class="card-mov"><div><p class="desc">${t.d}</p><p class="date">Hoje</p></div><p class="val">- R$ ${t.v.toFixed(2)}</p></div>`;
            });
            document.getElementById('saldo-topo').innerText = `R$ -${s.toFixed(2)}`;
        }

        function recalc() {
            const v = parseFloat(document.getElementById('rev-val').value) || 0;
            const p = parseInt(document.getElementById('rev-parc').value) || 1;
            document.getElementById('parc-label').innerText = `${p}X DE R$ ${(v/p).toFixed(2)}`;
        }
    </script>
</body>
</html>
